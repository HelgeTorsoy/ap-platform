function demoCaption(text, idx, total) {
  document.getElementById("demo-cap-body").innerHTML = text;
  document.getElementById("demo-progress").textContent = "Step " + (idx + 1) + " of " + total;
  document.getElementById("demo-step-label").textContent = (idx + 1) + " / " + total;
}

function demoMoveCursor(sel) {
  const cur = document.getElementById("demo-cursor");
  if (!sel) { cur.classList.remove("on"); return; }
  const el = document.querySelector(sel);
  if (!el) { cur.classList.remove("on"); return; }
  const r = el.getBoundingClientRect();
  cur.style.left = (r.left + Math.min(r.width * 0.5, 80)) + "px";
  cur.style.top = (r.top + Math.min(r.height * 0.5, 30)) + "px";
  cur.classList.add("on");
}

function demoClickRipple() {
  const cur = document.getElementById("demo-cursor");
  cur.classList.remove("click");
  void cur.offsetWidth;
  cur.classList.add("click");
}

function demoSpotlight(sel) {
  const spot = document.getElementById("demo-spotlight");
  if (!sel) { spot.classList.remove("on"); return; }
  const el = document.querySelector(sel);
  if (!el) { spot.classList.remove("on"); return; }
  const r = el.getBoundingClientRect();
  const pad = 10;
  spot.classList.remove("full");
  spot.style.left = (r.left - pad) + "px";
  spot.style.top = (r.top - pad) + "px";
  spot.style.width = (r.width + pad * 2) + "px";
  spot.style.height = (r.height + pad * 2) + "px";
  spot.classList.add("on");
}

function demoSpotlightOff() {
  document.getElementById("demo-spotlight").classList.remove("on");
}

function demoScrollTo(sel) {
  const el = sel && document.querySelector(sel);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  else window.scrollTo({ top: 0, behavior: "smooth" });
}

function openDemo() {
  state.demoOpen = true;
  state.demoStep = 0;
  state.demoPaused = false;
  state.demoCaption = "";
  state.view = "overview";
  document.getElementById("demo-host").classList.add("show");
  document.body.classList.add("demo-on");
  render();
  runDemoStep();
}

function closeDemo() {
  state.demoOpen = false;
  state.demoPaused = false;
  if (state.demoTimer) { clearTimeout(state.demoTimer); state.demoTimer = null; }
  document.getElementById("demo-host").classList.remove("show");
  document.body.classList.remove("demo-on");
  demoSpotlightOff();
  document.getElementById("demo-cursor").classList.remove("on");
  // Close any modal the demo may have left open
  const ov = document.getElementById("overlay");
  if (ov && ov.classList.contains("show")) closeModal();
  state.view = "pitch";
  render();
}

function nextDemoStep() {
  if (!state.demoOpen) return;
  if (state.demoTimer) { clearTimeout(state.demoTimer); state.demoTimer = null; }
  if (state.demoStep < DEMO_SCRIPT.length - 1) {
    state.demoStep++;
    runDemoStep();
  } else {
    // Loop back? For now, hold on the outro.
  }
}

function prevDemoStep() {
  if (!state.demoOpen) return;
  if (state.demoTimer) { clearTimeout(state.demoTimer); state.demoTimer = null; }
  if (state.demoStep > 0) {
    state.demoStep--;
    runDemoStep();
  }
}

function toggleDemoPause() {
  if (!state.demoOpen) return;
  state.demoPaused = !state.demoPaused;
  const btn = document.getElementById("demo-pp");
  if (btn) btn.textContent = state.demoPaused ? "▶" : "⏸";
  if (state.demoPaused) {
    if (state.demoTimer) { clearTimeout(state.demoTimer); state.demoTimer = null; }
  } else {
    // resume by re-running current step
    runDemoStep();
  }
}

function runDemoStep() {
  if (!state.demoOpen) return;
  const idx = state.demoStep;
  const step = DEMO_SCRIPT[idx];
  if (!step) return;
  demoCaption(step.caption, idx, DEMO_SCRIPT.length);

  const after = () => {
    if (step.spot) {
      demoScrollTo(step.spot);
      setTimeout(() => { demoSpotlight(step.spot); demoMoveCursor(step.spot); }, 500);
    } else {
      demoSpotlightOff();
    }
    if (!state.demoPaused) {
      state.demoTimer = setTimeout(() => {
        if (!state.demoPaused) nextDemoStep();
      }, step.hold || 4000);
    }
  };

  // Execute the action
  const a = step.args || {};
  switch (step.do) {
    case "intro": {
      // Show a soft full-dim spotlight for the intro
      const spot = document.getElementById("demo-spotlight");
      spot.classList.add("on", "full");
      spot.style.left = "0px"; spot.style.top = "0px";
      spot.style.width = "100vw"; spot.style.height = "100vh";
      after(); return;
    }
    case "outro": {
      demoSpotlightOff();
      document.getElementById("demo-cursor").classList.remove("on");
      after(); return;
    }
    case "nav": {
      state.view = a.view; render();
      setTimeout(after, 400); return;
    }
    case "click": {
      demoMoveCursor(a.sel);
      setTimeout(() => {
        demoClickRipple();
        const el = document.querySelector(a.sel);
        if (el) el.click();
        setTimeout(after, 350);
      }, 600);
      return;
    }
    case "spot": {
      after(); return;
    }
    case "openInv": {
      // Ensure we're on invoices first
      if (state.view !== "invoices") { state.view = "invoices"; render(); }
      setTimeout(() => {
        const sel = "[data-row-id=\"" + a.id + "\"]";
        demoScrollTo(sel);
        setTimeout(() => {
          demoMoveCursor(sel);
          setTimeout(() => {
            demoClickRipple();
            openInvoice(a.id);
            setTimeout(after, 300);
          }, 600);
        }, 500);
      }, 200);
      return;
    }
    case "modalTab": {
      state.modalTab = a.tab;
      // Re-render modal: re-invoke openInvoice with current id (renders modal again)
      const id = state.modalId || (function(){
        // Find from open modal
        const open = document.querySelector("#modal [data-modal-id]");
        return open ? open.dataset.modalId : null;
      })();
      if (id) openInvoice(id);
      else {
        // fallback: click the tab button
        const btn = document.querySelector('#modal [data-tab="' + a.tab + '"]');
        if (btn) btn.click();
      }
      setTimeout(() => {
        const sel = '#modal [data-tab="' + a.tab + '"]';
        demoMoveCursor(sel);
        after();
      }, 300);
      return;
    }
    case "typeAi": {
      // Navigate into the AI bar location first if needed
      const inp = document.getElementById("q-ai-input");
      if (!inp) { after(); return; }
      demoScrollTo("#q-ai-input");
      demoMoveCursor("#q-ai-input");
      state.queueAiQuery = "";
      inp.value = "";
      let i = 0;
      const text = a.text || "";
      const perChar = a.perChar || 40;
      const tick = () => {
        if (!state.demoOpen || state.demoPaused) return;
        if (i <= text.length) {
          inp.value = text.slice(0, i);
          state.queueAiQuery = inp.value;
          i++;
          setTimeout(tick, perChar);
        } else {
          after();
        }
      };
      tick();
      return;
    }
    case "submitAi": {
      const inp = document.getElementById("q-ai-input");
      const v = inp ? inp.value : state.queueAiQuery;
      qRunAiQuery(v);
      setTimeout(after, 600);
      return;
    }
    case "resetAi": {
      qResetAi();
      state.queueSegment = "all";
      render();
      setTimeout(after, 400);
      return;
    }
    case "simulate": {
      simulateArrival(a.source || "PEPPOL");
      setTimeout(() => {
        // spotlight the newest row
        const rows = document.querySelectorAll("[data-row-id]");
        if (rows.length) {
          const last = rows[rows.length - 1];
          const sel = '[data-row-id="' + last.dataset.rowId + '"]';
          demoScrollTo(sel);
          setTimeout(() => { demoSpotlight(sel); demoMoveCursor(sel); }, 400);
        }
        after();
      }, 400);
      return;
    }
    case "closeModal": {
      closeModal();
      setTimeout(after, 300);
      return;
    }
    default:
      after();
  }
}

/* Keyboard shortcuts for the demo */
window.addEventListener("keydown", e => {
  if (!state.demoOpen) return;
  if (e.key === " " || e.code === "Space") { e.preventDefault(); toggleDemoPause(); }
  else if (e.key === "ArrowRight") { e.preventDefault(); nextDemoStep(); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); prevDemoStep(); }
  else if (e.key === "Escape") { e.preventDefault(); closeDemo(); }
});



function tour2NavTo(view) {

  document.querySelectorAll("#nav button[data-view]").forEach(x => x.classList.toggle("active", x.dataset.view === view));
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

      { at: 9.5, setSeg: "needs-me", spot: ".q-segments" }
    ]
  },
  "mgr-analytics": {
    sequence: [
      { at: 0.3, spot: ".kpi-grid", scroll: ".kpi-grid" }
    ]
  },
  "mgr-customizing": {
    sequence: [
      { at: 0.2, setCust: "automation", spot: ".cust-shell", scroll: ".cust-shell" },
      { at: 4.5, setCust: "approval", spot: ".cust-shell" },
      { at: 9, setCust: "vendors", spot: ".cust-shell" }
    ]
  },
  "mgr-wrap": {
    sequence: [
      { at: 0, closeModal: true },
      { at: 0.3, spot: ".hero" }
    ]
  },

  /* ---------- Accountant tour ---------- */
  "acc-intro": {
    sequence: [
      { at: 0, closeModal: true },
      { at: 0.3, spot: "#nav" }
    ]
  },
  "acc-cockpit": {
    sequence: [
      { at: 0.3, spot: ".cp-jump-grid", scroll: ".cp-jump-grid" },
      { at: 3, pulse: ".cp-jump-card.s-attention", spot: ".cp-jump-card.s-attention" },
      { at: 7, spot: ".cp-ai-bar", scroll: ".cp-ai-bar" }
    ]
  },
  "acc-queue": {
    sequence: [
      { at: 0, setSeg: "needs-me", resetQueueAi: true },
      { at: 0.3, spot: ".q-segments", scroll: ".q-segments" },
      { at: 3.5, spot: ".q-table", scroll: ".q-table" },
      { at: 6.5, typeQueueAi: "show non-PO invoices over 5k with low confidence", perChar: 38, spot: "#q-ai-input", scroll: "#q-ai-input" },
      { at: 10.5, submitQueueAi: true, spot: ".q-ai-resp" }
    ]
  },
  "acc-invoice": {
    sequence: [
      { at: 0, setSeg: "needs-me", resetQueueAi: true },
      { at: 0.3, openInv: true, fromSeg: "needs-me" },
      { at: 0.8, modalTab: "render" },
      { at: 4, modalTab: "coding" },
      { at: 8, modalTab: "matching" }
    ]
  },
  "acc-ses": {
    sequence: [
      { at: 0, closeModal: true, setSeg: "needs-me", resetQueueAi: true },
      { at: 0.4, spot: ".q-table", scroll: ".q-table" }
    ]
  },
  "acc-comms": {
    sequence: [
      { at: 0, closeModal: true, clearCockpitAi: true },
      { at: 0.3, spot: ".cp-ai-bar", scroll: ".cp-ai-bar" },
      { at: 3.5, cockpitAi: "any vendor patterns I should watch?" }
    ]
  },
  "acc-wrap": {
    sequence: [
      { at: 0, closeModal: true },
      { at: 0.3, spot: ".hero" }
    ]
  }
};

function tour2SpotlightOn(sel, soft) {
  const el = sel && document.querySelector(sel);
  const spot = document.getElementById("tour2-spotlight");
  if (!el || !spot) { if (spot) spot.classList.remove("on", "soft"); return; }
  const r = el.getBoundingClientRect();
  const pad = 10;
  spot.style.left = (r.left - pad) + "px";
  spot.style.top = (r.top - pad) + "px";
  spot.style.width = (r.width + pad * 2) + "px";
  spot.style.height = (r.height + pad * 2) + "px";
  spot.classList.toggle("soft", !!soft);
  spot.classList.add("on");
}

function tour2SpotlightOff() {
  const spot = document.getElementById("tour2-spotlight");
  if (spot) { spot.classList.remove("on", "soft"); }
}

function tour2ScrollTo(sel) {
  const el = sel && document.querySelector(sel);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
}

function tour2FirstInvoiceForSeg(seg) {
  const list = (state.invoices || []).filter(i => qSegmentMatches(i, seg || "all"));
  return list.length ? list[0].id : null;
}

function tour2CloseOpenModal() {
  const ov = document.getElementById("overlay");
  if (ov && ov.classList.contains("show")) {
    try { closeModal(); } catch (e) {}
  }
}

/* Type characters into an input field one at a time — used for AI bars.
   Updates the live state value the renderer expects so the value persists
   across re-renders triggered mid-typing. */
function tour2TypeText(selector, text, perCharMs, stateKey) {
  const inp = document.querySelector(selector);
  if (!inp) return;
  inp.value = "";
  if (stateKey) state[stateKey] = "";
  let i = 0;
  const step = () => {
    if (!state.tour2Open) return;
    const liveInp = document.querySelector(selector);
    if (!liveInp) return;
    if (i <= text.length) {
      const slice = text.slice(0, i);
      liveInp.value = slice;
      if (stateKey) state[stateKey] = slice;
      i++;
      const id = setTimeout(step, perCharMs || 38);
      state.tour2SubTimers && state.tour2SubTimers.push(id);
    }
  };
  step();
}

function tour2SubmitQueueAi() {
  try {
    const inp = document.getElementById("q-ai-input");
    const v = inp ? inp.value : state.queueAiQuery;
    if (typeof qRunAiQuery === "function") qRunAiQuery(v || "");
  } catch (e) {}
}

function tour2ResetQueueAi() {
  try {
    if (typeof qResetAi === "function") qResetAi();
    state.queueSegment = state.queueSegment || "all";
    render();
  } catch (e) {}
}

function tour2SetCockpitAi(text) {
  try {
    if (typeof answerCockpitAi === "function") {
      state.cockpitAiAnswer = answerCockpitAi(text || "");
      render();
    }
  } catch (e) {}
}

function tour2ClearCockpitAi() {
  state.cockpitAiAnswer = "";
}

function tour2ClearSubTimers() {
  if (!state.tour2SubTimers) { state.tour2SubTimers = []; return; }
  state.tour2SubTimers.forEach(id => clearTimeout(id));
  state.tour2SubTimers = [];
}

/* Apply one sub-action. Called from the sub-timer scheduler. */
function tour2ApplySubAction(sub) {
  if (!sub) return;

  // Modal/state mutations first
  if (sub.closeModal) tour2CloseOpenModal();

  let needsRender = false;
  if (sub.setSeg && state.queueSegment !== sub.setSeg) {
    state.queueSegment = sub.setSeg; needsRender = true;
  }
  if (sub.setCust && state.custSection !== sub.setCust) {
    state.custSection = sub.setCust; needsRender = true;
  }
  if (sub.resetQueueAi) {
    try { if (typeof qResetAi === "function") qResetAi(); } catch (e) {}
    needsRender = true;
  }
  if (sub.clearCockpitAi) {
    state.cockpitAiAnswer = "";
    needsRender = true;
  }
  if (needsRender) render();

  // Open invoice
  if (sub.openInv) {
    const seg = sub.fromSeg || state.queueSegment || "all";
    const targetId = sub.invoiceId || tour2FirstInvoiceForSeg(seg);
    if (targetId) {
      if (sub.modalTab) state.modalTab = sub.modalTab;
      try { openInvoice(targetId); } catch (e) {}
    }
  } else if (sub.modalTab && state.modalId) {
    state.modalTab = sub.modalTab;
    try { openInvoice(state.modalId); } catch (e) {}
  }

  // Cockpit AI answer
  if (sub.cockpitAi) {
    tour2SetCockpitAi(sub.cockpitAi);
  }

  // Typing the queue AI bar — character by character
  if (sub.typeQueueAi) {
    tour2TypeText("#q-ai-input", sub.typeQueueAi, sub.perChar || 38, "queueAiQuery");
  }

  // Submit the queue AI query
  if (sub.submitQueueAi) {
    tour2SubmitQueueAi();
  }

  // Scroll + spotlight + pulse, deferred so render/modal can paint
  const scrollSel = sub.scroll || sub.spot;
  const spotSel = sub.spot;
  const pulseSel = sub.pulse;
  if (scrollSel || spotSel || pulseSel) {
    const id1 = setTimeout(() => {
      if (!state.tour2Open) return;
      if (scrollSel) tour2ScrollTo(scrollSel);
      const id2 = setTimeout(() => {
        if (!state.tour2Open) return;
        if (spotSel) tour2SpotlightOn(spotSel, !!sub.soft);
        if (pulseSel) {
          const pel = document.querySelector(pulseSel);
          if (pel) { pel.classList.remove("tour-pulse"); void pel.offsetWidth; pel.classList.add("tour-pulse"); }
        }
      }, 340);
      state.tour2SubTimers && state.tour2SubTimers.push(id2);
    }, 80);
    state.tour2SubTimers && state.tour2SubTimers.push(id1);
  }
}

function runTour2Action(stop) {
  // Always clear prior sub-timers and the spotlight before scheduling new ones
  tour2ClearSubTimers();
  tour2SpotlightOff();
  if (!stop) return;
  const act = TOUR_ACTIONS[stop.id];
  if (!act) return; // no interaction — coach mark only

  // Schedule the sub-action sequence at offsets within the stop
  if (Array.isArray(act.sequence)) {
    act.sequence.forEach(sub => {
      const delay = Math.max(0, (sub.at || 0) * 1000);
      const id = setTimeout(() => tour2ApplySubAction(sub), delay);
      state.tour2SubTimers.push(id);
    });
    return;
  }

  // Backwards compatibility: simple top-level action shape (no sequence)
  if (act.closeModal) tour2CloseOpenModal();
  let needsRender = false;
  if (act.setSeg && state.queueSegment !== act.setSeg) {
    state.queueSegment = act.setSeg; needsRender = true;
  }
  if (act.setCust && state.custSection !== act.setCust) {
    state.custSection = act.setCust; needsRender = true;
  }
  if (needsRender) render();
  if (act.openFirstInvoice) {
    const seg = act.setSeg || state.queueSegment || "all";
    const targetId = tour2FirstInvoiceForSeg(seg);
    if (targetId) {
      if (act.modalTab) state.modalTab = act.modalTab;
      try { openInvoice(targetId); } catch (e) {}
    }
  } else if (act.modalTab && state.modalId) {
    state.modalTab = act.modalTab;
    try { openInvoice(state.modalId); } catch (e) {}
  }
  const scrollSel = act.scroll || act.spot;
  const spotSel = act.spot;
  const idA = setTimeout(() => {
    if (scrollSel) tour2ScrollTo(scrollSel);
    const idB = setTimeout(() => {
      if (spotSel) tour2SpotlightOn(spotSel, !!act.soft);
      if (act.pulse) {
        const pel = document.querySelector(act.pulse);
        if (pel) { pel.classList.remove("tour-pulse"); void pel.offsetWidth; pel.classList.add("tour-pulse"); }
      }
    }, 380);
    state.tour2SubTimers.push(idB);
  }, 120);
  state.tour2SubTimers.push(idA);
}

/* Recalc the spotlight rectangle on resize / scroll so it tracks its target */
window.addEventListener("resize", () => {
  if (!state.tour2Open) return;
  const stop = TOUR2_STOPS[state.tour2Step];
  const act = stop && TOUR_ACTIONS[stop.id];
  if (act && act.spot) tour2SpotlightOn(act.spot, !!act.soft);
});
window.addEventListener("scroll", () => {
  if (!state.tour2Open) return;
  const stop = TOUR2_STOPS[state.tour2Step];
  const act = stop && TOUR_ACTIONS[stop.id];
  if (act && act.spot) tour2SpotlightOn(act.spot, !!act.soft);
}, { passive: true });

function openTour2(startStep) {
  state.tour2Open = true;
  state.tour2Step = startStep || 0;
  state.tour2Elapsed = 0;
  state.tour2Paused = false;
  state.tour2SubTimers = [];
  for (let i = 0; i < (startStep || 0); i++) state.tour2Elapsed += TOUR2_STOPS[i].durationSec;
  document.body.classList.add("tour-active");
  const stop = TOUR2_STOPS[state.tour2Step];
  if (stop && stop.targetView) tour2NavTo(stop.targetView);
  refreshTour2();
  startTour2Timer();
  setTimeout(() => runTour2Action(stop), 420);
}

function closeTour2() {
  state.tour2Open = false;
  state.tour2Paused = false;
  stopTour2Timer();
  tour2ClearSubTimers();
  tour2SpotlightOff();
  tour2CloseOpenModal();
  state.cockpitAiAnswer = "";
  try { if (typeof qResetAi === "function") qResetAi(); } catch (e) {}
  document.body.classList.remove("tour-active");
  document.getElementById("tour2").classList.remove("show");
  document.getElementById("tour2-card").innerHTML = "";
}

function startTour2Timer() {
  stopTour2Timer();
  state.tour2Timer = setInterval(() => {
    if (state.tour2Paused) return;
    state.tour2Elapsed += 1;
    const stop = TOUR2_STOPS[state.tour2Step];
    let stopStart = 0;
    for (let i = 0; i < state.tour2Step; i++) stopStart += TOUR2_STOPS[i].durationSec;
    const inStop = state.tour2Elapsed - stopStart;
    if (inStop >= stop.durationSec) {
      if (state.tour2Step < TOUR2_STOPS.length - 1) {
        state.tour2Step += 1;
        const next = TOUR2_STOPS[state.tour2Step];
        const navChange = next.targetView && next.targetView !== state.view;
        if (navChange) tour2NavTo(next.targetView);
        refreshTour2();
        setTimeout(() => runTour2Action(next), navChange ? 420 : 60);
      } else {
        stopTour2Timer();
        refreshTour2();
      }
    } else {
      const fillEl = document.getElementById("tour2-fill");
      const timerEl = document.getElementById("tour2-timer");
      if (fillEl) fillEl.style.width = ((state.tour2Elapsed / TOUR2_TOTAL_SEC) * 100) + "%";
      if (timerEl) {
        const remaining = Math.max(0, TOUR2_TOTAL_SEC - state.tour2Elapsed);
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        timerEl.textContent = m + ":" + (s < 10 ? "0" + s : s) + " left";
      }
    }
  }, 1000);
}

function stopTour2Timer() {
  if (state.tour2Timer) { clearInterval(state.tour2Timer); state.tour2Timer = null; }
}

function refreshTour2() {
  if (!state.tour2Open) return;
  const stop = TOUR2_STOPS[state.tour2Step];
  const total = TOUR2_STOPS.length;
  const pct = (state.tour2Elapsed / TOUR2_TOTAL_SEC) * 100;
  const remaining = Math.max(0, TOUR2_TOTAL_SEC - state.tour2Elapsed);
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  const isLast = state.tour2Step === total - 1;
  const nextLbl = isLast ? "Finish ✓" : "Next →";
  const pauseLbl = state.tour2Paused ? "▶" : "⏸";
  const card = document.getElementById("tour2-card");
  card.innerHTML = `
    <div class="tour2-progress"><div class="fill" id="tour2-fill" style="width:${pct}%"></div></div>
    <button class="tour2-close" id="tour2-close" aria-label="Close">×</button>
    <div class="tour2-meta">
      <span class="step-pill">${escapeHtml(stop.eyebrow)} · ${state.tour2Step + 1}/${total}</span>
      <span class="timer" id="tour2-timer">${m}:${s < 10 ? "0" + s : s} left</span>
    </div>
    <div class="tour2-body">
      <div class="tour2-eyebrow"><span class="live-dot"></span> 2-minute guided tour · live</div>
      <div class="tour2-title">${escapeHtml(stop.title)}</div>
      <div class="tour2-narrative">${escapeHtml(stop.narrative)}</div>
      ${stop.callout ? `<div class="tour2-callout"><div class="lbl">${escapeHtml(stop.callout.lbl)}</div><div class="v">${escapeHtml(stop.callout.v)}</div></div>` : ""}
      <div class="tour2-viewing"><span class="arrow">▸</span> You're looking at <strong>${escapeHtml(stop.viewLabel || stop.targetView)}</strong></div>
    </div>
    <div class="tour2-actions">
      <button class="btn-skip" data-action="tour2-skip">End tour</button>
      <button class="btn-pause" data-action="tour2-pause" title="${state.tour2Paused ? "Resume" : "Pause"}">${pauseLbl}</button>
      <div class="spacer"></div>
      ${state.tour2Step > 0 ? '<button class="btn-prev" data-action="tour2-prev">← Back</button>' : ""}
      <button class="btn-next" data-action="tour2-next">${nextLbl}</button>
    </div>
  `;
  document.getElementById("tour2").classList.add("show");
  document.getElementById("tour2-close").onclick = closeTour2;
  card.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const a = el.dataset.action;
      if (a === "tour2-skip") closeTour2();
      else if (a === "tour2-pause") {
        state.tour2Paused = !state.tour2Paused;
        refreshTour2();
      } else if (a === "tour2-next") {
        if (state.tour2Step < total - 1) {
          let stopStart = 0;
          for (let i = 0; i <= state.tour2Step; i++) stopStart += TOUR2_STOPS[i].durationSec;
          state.tour2Elapsed = stopStart;
          state.tour2Step += 1;
          const next = TOUR2_STOPS[state.tour2Step];
          const navChange = next.targetView && next.targetView !== state.view;
          if (navChange) tour2NavTo(next.targetView);
          refreshTour2();
          setTimeout(() => runTour2Action(next), navChange ? 420 : 60);
        } else {
          closeTour2();
        }
      } else if (a === "tour2-prev") {
        if (state.tour2Step > 0) {
          state.tour2Step -= 1;
          let stopStart = 0;
          for (let i = 0; i < state.tour2Step; i++) stopStart += TOUR2_STOPS[i].durationSec;
          state.tour2Elapsed = stopStart;
          const prev = TOUR2_STOPS[state.tour2Step];
          const navChange = prev.targetView && prev.targetView !== state.view;
          if (navChange) tour2NavTo(prev.targetView);
          refreshTour2();
          setTimeout(() => runTour2Action(prev), navChange ? 420 : 60);
        }
      }
    });
  });
}

document.addEventListener("change", e => {
  if (e.target.dataset && e.target.dataset.action === "kpi-toggle") {
    const id = e.target.dataset.id;
    const k = state.kpis.find(x => x.id === id);
    if (k) { k.enabled = e.target.checked; render(); }
  }
});



function toast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.innerHTML = msg;
  document.getElementById("toast-host").appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

if (!sessionStorage.getItem("ap-tour-seen")) {
  setTimeout(() => { state.tourStep = 0; renderTour(); sessionStorage.setItem("ap-tour-seen","1"); }, 400);
}

render();
</script>
