  .cp-msg .ava.ai  { background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dark) 100%); color: #fff; }
  .cp-msg .bub { background: #fff; border: 1px solid #ece9ea; border-radius: 12px; padding: 12px 16px; font-size: 12.5px; color: var(--ink); line-height: 1.55; box-shadow: 0 1px 2px rgba(0,0,0,.02); }
  .cp-msg.user .bub { background: var(--magenta-dark); color: #fff; border-color: var(--magenta-dark); }
  .cp-msg.user .bub strong { color: #fff; }
  .cp-msg .bub h5 { margin: 0 0 6px; font-size: 12px; color: var(--magenta-dark); }
  .cp-msg .bub p { margin: 0 0 8px; }
  .cp-msg .bub p:last-child { margin-bottom: 0; }
  .cp-msg .bub ul { margin: 6px 0 8px; padding-left: 18px; }
  .cp-msg .bub li { margin-bottom: 3px; }
  .cp-msg .bub strong { color: var(--magenta-dark); }
  .cp-msg .bub .num { font-family: 'SF Mono', Menlo, monospace; background: #fafaf9; padding: 1px 5px; border-radius: 3px; font-size: 11.5px; }
  .cp-msg .bub table { width: 100%; border-collapse: collapse; font-size: 11.5px; margin: 8px 0; }
  .cp-msg .bub table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); padding: 6px 8px 6px 0; border-bottom: 1px solid #ece9ea; font-weight: 700; }
  .cp-msg .bub table td { padding: 6px 8px 6px 0; border-bottom: 1px solid #f5f3f4; }
  .cp-msg .bub table td.amt { font-family: 'SF Mono', Menlo, monospace; text-align: right; font-weight: 600; }

  .cp-cite { margin-top: 10px; padding-top: 8px; border-top: 1px dashed #ece9ea; display: flex; flex-wrap: wrap; gap: 5px; }
  .cp-cite .pill { font-size: 10.5px; padding: 3px 8px; border-radius: 10px; background: #f1f3f6; color: var(--gray-700); cursor: pointer; font-weight: 600; border: 1px solid transparent; }
  .cp-cite .pill:hover { background: var(--magenta-10); color: var(--magenta-dark); border-color: var(--magenta-40); }
  .cp-cite .pill .src { color: var(--muted); margin-right: 4px; font-size: 9.5px; text-transform: uppercase; letter-spacing: .03em; }

  .cp-trace { margin-top: 8px; font-size: 10.5px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .cp-trace .agent { display: inline-flex; align-items: center; gap: 4px; background: #fafaf9; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; color: var(--gray-700); }
  .cp-trace .agent::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--good); display: inline-block; }
  .cp-trace .latency { color: var(--muted); font-family: 'SF Mono', Menlo, monospace; }

  .cp-thinking { display: flex; gap: 12px; align-items: center; align-self: flex-start; padding-left: 4px; }
  .cp-thinking .ava { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dark) 100%); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; }
  .cp-thinking .dots { display: flex; gap: 4px; }
  .cp-thinking .dots span { width: 7px; height: 7px; background: var(--magenta); border-radius: 50%; opacity: .4; animation: cpDot 1.2s infinite ease-in-out; }
  .cp-thinking .dots span:nth-child(2) { animation-delay: .15s; }
  .cp-thinking .dots span:nth-child(3) { animation-delay: .3s; }
  .cp-thinking .label { font-size: 11.5px; color: var(--gray-700); margin-left: 6px; font-style: italic; }
  @keyframes cpDot { 0%, 80%, 100% { opacity: .3; transform: scale(.8); } 40% { opacity: 1; transform: scale(1); } }

  .cp-input { padding: 14px 22px 16px; border-top: 1px solid #ece9ea; background: #fff; }
  .cp-input .row { display: flex; gap: 8px; align-items: center; background: #fafaf9; border: 1px solid #ece9ea; border-radius: 22px; padding: 6px 6px 6px 16px; }
  .cp-input .row:focus-within { border-color: var(--magenta-40); background: #fff; }
  .cp-input input { flex: 1; border: 0; outline: 0; background: transparent; font-size: 13px; color: var(--ink); padding: 6px 0; font-family: inherit; }
  .cp-input button.send { background: var(--magenta-dark); color: #fff; border: 0; border-radius: 18px; padding: 8px 14px; cursor: pointer; font-weight: 700; font-size: 12px; }
  .cp-input button.send:hover { background: #6a1c3d; }
  .cp-input button.send:disabled { background: #d8d5d6; cursor: not-allowed; }
  .cp-input .hint { font-size: 10.5px; color: var(--muted); margin-top: 6px; padding-left: 14px; }
  .cp-input .hint kbd { background: #eef0f3; padding: 1px 5px; border-radius: 3px; font-family: 'SF Mono', Menlo, monospace; font-size: 10px; color: var(--gray-700); }

  .cp-suggested { padding: 0 22px 14px; display: flex; flex-wrap: wrap; gap: 6px; background: #fff; border-top: 1px dashed #ece9ea; padding-top: 14px; }
  .cp-suggested .lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 700; width: 100%; margin-bottom: 2px; }
  .cp-suggested button { padding: 6px 11px; background: #fff; border: 1px solid #ece9ea; border-radius: 14px; cursor: pointer; font-size: 11.5px; color: var(--gray-700); font-weight: 600; transition: all .12s; }
  .cp-suggested button:hover { border-color: var(--magenta-40); color: var(--magenta-dark); background: var(--magenta-10); }
  .cp-suggested button.q::before { content: "❓ "; font-size: 9px; opacity: .55; }
  .cp-suggested button.action::before { content: "▶ "; color: var(--magenta); }
  .cp-suggested button.report::before { content: "▦ "; color: var(--good); }

  .cp-right { background: #fff; border: 1px solid #ece9ea; border-radius: 12px; padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
  .cp-right h4 { margin: 0 0 6px; font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 800; }
  .cp-right .info { font-size: 11.5px; color: var(--gray-700); line-height: 1.5; }
  .cp-right .info p { margin: 0 0 8px; }
  .cp-right .src { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: #fafaf9; border-radius: 7px; font-size: 11.5px; color: var(--ink); font-weight: 600; }
  .cp-right .src .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); }
  .cp-right .src .ct { margin-left: auto; font-size: 10.5px; color: var(--muted); font-weight: 400; font-family: 'SF Mono', Menlo, monospace; }
  .cp-right .gov { background: var(--good-soft); border: 1px solid #c8e3d2; border-radius: 7px; padding: 10px 12px; font-size: 11.5px; color: var(--gray-700); line-height: 1.5; }
  .cp-right .gov strong { color: var(--good); display: block; margin-bottom: 2px; }

  /* --- Contract chip inside invoice matching panel --- */
  .contract-chip { display: flex; gap: 18px; align-items: center; background: linear-gradient(135deg, var(--magenta-10) 0%, #fff 80%); border: 1px solid var(--magenta-40); border-radius: 10px; padding: 12px 16px; margin: 12px 0 14px; }
  .contract-chip .cc-left { flex: 1; }
  .contract-chip .cc-eyebrow { font-size: 10px; color: var(--magenta-dark); text-transform: uppercase; letter-spacing: .05em; font-weight: 800; margin-bottom: 3px; }
  .contract-chip .cc-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .contract-chip .cc-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 11px; color: var(--gray-700); }
  .contract-chip .cc-meta b { color: var(--magenta-dark); }
  .contract-chip .cc-right { width: 200px; flex-shrink: 0; }
  .contract-chip .cc-consume .bar { height: 6px; background: #ece9ea; border-radius: 3px; overflow: hidden; }
  .contract-chip .cc-consume .bar .fill { height: 100%; background: linear-gradient(90deg, var(--magenta) 0%, var(--magenta-dark) 100%); border-radius: 3px; transition: width .3s; }
  .contract-chip .cc-consume .lbl { font-size: 10.5px; color: var(--gray-700); margin-top: 5px; font-family: 'SF Mono', Menlo, monospace; text-align: right; }

  /* --- OCR / Document intelligence for legacy PDFs --- */
  .ocr-hero { background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dark) 100%); color: #fff; border-radius: 14px; padding: 22px 28px; margin-bottom: 18px; position: relative; overflow: hidden; }
  .ocr-hero::after { content: ""; position: absolute; right: -50px; bottom: -50px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(255,255,255,.10) 0%, transparent 70%); pointer-events: none; }
  .ocr-hero h2 { margin: 0 0 6px; font-size: 22px; letter-spacing: -0.3px; }
  .ocr-hero .sub { margin: 0 0 18px; font-size: 13px; opacity: .9; max-width: 720px; line-height: 1.55; }
  .ocr-hero .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .ocr-hero .stat .lbl { font-size: 10.5px; opacity: .75; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }
  .ocr-hero .stat .val { font-size: 26px; font-weight: 700; line-height: 1.1; margin-top: 2px; }
  .ocr-hero .stat .val.accent { color: #ff9bbf; }
  .ocr-hero .stat .det { font-size: 11px; opacity: .8; margin-top: 2px; }

  .ocr-layout { display: grid; grid-template-columns: 340px 1fr; gap: 18px; }

  .ocr-queue { background: #fff; border: 1px solid #ece9ea; border-radius: 12px; overflow: hidden; }
  .ocr-queue-hdr { padding: 12px 14px; border-bottom: 1px solid #ece9ea; background: #fafaf9; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .ocr-queue-hdr .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 700; width: 100%; margin-bottom: 4px; }
  .ocr-queue-hdr .seg { display: flex; gap: 3px; background: #eef0f3; padding: 2px; border-radius: 14px; width: 100%; }
  .ocr-queue-hdr .seg button { flex: 1; padding: 5px 8px; border: 0; background: transparent; border-radius: 12px; font-size: 11px; font-weight: 700; color: var(--gray-700); cursor: pointer; }
  .ocr-queue-hdr .seg button.active { background: #fff; color: var(--magenta-dark); box-shadow: 0 1px 3px rgba(0,0,0,.05); }

  .ocr-row { padding: 12px 14px; border-bottom: 1px solid #f5f3f4; cursor: pointer; display: flex; gap: 12px; align-items: flex-start; transition: background .12s; }
  .ocr-row:hover { background: var(--magenta-10); }
  .ocr-row.selected { background: var(--magenta-10); border-left: 3px solid var(--magenta); padding-left: 11px; }
  .ocr-row .thumb { width: 42px; height: 56px; background: #fafaf9; border: 1px solid #ece9ea; border-radius: 3px; display: flex; flex-direction: column; padding: 3px; flex-shrink: 0; gap: 1px; }
  .ocr-row .thumb .l { height: 2px; background: #d8d5d6; border-radius: 1px; }
  .ocr-row .thumb .l.short { width: 60%; }
  .ocr-row .thumb .l.amt { width: 30%; align-self: flex-end; margin-top: auto; background: #b8b3b4; height: 4px; }
  .ocr-row .meta { flex: 1; min-width: 0; }
  .ocr-row .meta .top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; flex-wrap: wrap; }
  .ocr-row .meta .src { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }
  .ocr-row .meta .src.email { background: #d8eef9; color: #1e5b8a; }
  .ocr-row .meta .src.scan  { background: #e0d4eb; color: #5b3680; }
  .ocr-row .meta .src.upload{ background: #fde8c2; color: #8a5a14; }
  .ocr-row .meta .st { font-size: 9.5px; font-weight: 800; padding: 2px 7px; border-radius: 10px; }
  .ocr-row .meta .st.extracted { background: var(--good-soft); color: var(--good); }
  .ocr-row .meta .st.review    { background: var(--warn-soft); color: var(--warn); }
  .ocr-row .meta .st.failed    { background: var(--bad-soft); color: var(--bad); }
  .ocr-row .meta .st.promoted  { background: #e0e1ff; color: #3a3a99; }
  .ocr-row .meta .ttl { font-size: 12.5px; font-weight: 600; color: var(--ink); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ocr-row .meta .det { font-size: 11px; color: var(--muted); }
  .ocr-row .meta .conf-bar { height: 3px; background: #eef0f3; border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .ocr-row .meta .conf-bar .fill { height: 100%; background: linear-gradient(90deg, var(--magenta) 0%, var(--magenta-dark) 100%); }
  .ocr-row .meta .conf-bar .fill.low { background: var(--warn); }
  .ocr-row .meta .conf-bar .fill.bad { background: var(--bad); }

  .ocr-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

  .ocr-doc { background: #fff; border: 1px solid #ece9ea; border-radius: 12px; padding: 16px 18px; align-self: start; }
  .ocr-doc h3 { margin: 0 0 4px; font-size: 13px; color: var(--magenta-dark); }
  .ocr-doc .sub { margin: 0 0 12px; font-size: 11px; color: var(--muted); }
  .ocr-page { background: #faf8f4; border: 1px solid #d8d5d6; border-radius: 6px; padding: 22px 26px; font-size: 11.5px; line-height: 1.55; color: #1f1d1e; box-shadow: inset 0 0 0 1px #ece9ea, 0 2px 6px rgba(0,0,0,.04); position: relative; min-height: 480px; font-family: 'Georgia', serif; }
  .ocr-page::after { content: ""; position: absolute; left: 0; right: 0; top: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(0,0,0,.012) 18px, rgba(0,0,0,.012) 19px); pointer-events: none; border-radius: 6px; }
  .ocr-page .letterhead { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #d8c8b8; }
  .ocr-page .letterhead .lh-l { }
  .ocr-page .letterhead .vname { font-size: 17px; font-weight: 800; color: #2a2526; font-family: 'Georgia', serif; letter-spacing: -0.2px; }
  .ocr-page .letterhead .vaddr { font-size: 10.5px; color: #4a4042; margin-top: 4px; line-height: 1.5; }
  .ocr-page .letterhead .lh-r { text-align: right; font-size: 9.5px; color: #4a4042; }
  .ocr-page .letterhead .lh-r .label { font-size: 18px; font-weight: 800; color: #2a2526; letter-spacing: 1px; }
  .ocr-page .meta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 22px; margin-bottom: 16px; font-size: 11px; }
  .ocr-page .meta-row .k { color: #6b5e60; text-transform: uppercase; letter-spacing: .03em; font-size: 9.5px; font-weight: 700; }
  .ocr-page .meta-row .v { color: #1f1d1e; font-weight: 600; }
  .ocr-page .lines { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 11px; }
  .ocr-page .lines th { text-align: left; border-bottom: 1.5px solid #2a2526; padding: 5px 6px; font-size: 9.5px; text-transform: uppercase; letter-spacing: .04em; color: #2a2526; }
  .ocr-page .lines td { padding: 5px 6px; border-bottom: 1px solid #e8dcc8; }
  .ocr-page .lines td.amt { text-align: right; font-family: 'SF Mono', Menlo, monospace; }
  .ocr-page .totals { display: flex; justify-content: flex-end; margin-top: 14px; }
  .ocr-page .totals table { font-size: 11px; }
  .ocr-page .totals td { padding: 3px 12px; }
  .ocr-page .totals .grand { border-top: 2px solid #2a2526; font-weight: 800; font-size: 12.5px; padding-top: 6px; }
  .ocr-page .stamp { position: absolute; right: 50px; bottom: 90px; border: 3px solid #b1342b; color: #b1342b; padding: 6px 14px; transform: rotate(-12deg); font-size: 13px; font-weight: 800; letter-spacing: .15em; opacity: .65; font-family: 'Arial', sans-serif; }
  .ocr-page .signature { position: absolute; right: 80px; bottom: 40px; font-family: 'Brush Script MT', cursive; font-size: 22px; color: #1e5b8a; transform: rotate(-3deg); opacity: .7; }
  .ocr-page .badscan { filter: blur(.4px) contrast(.95); }
  .ocr-page .handwritten { font-family: 'Brush Script MT', cursive; font-style: italic; color: #1e5b8a; font-size: 13px; }

  .ocr-bbox { position: absolute; border: 2px solid var(--magenta); border-radius: 2px; pointer-events: none; box-shadow: 0 0 0 4px rgba(206, 15, 105, .08); animation: bboxPulse 2.4s infinite ease-in-out; z-index: 5; }
  @keyframes bboxPulse { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }
  .ocr-bbox .bb-lbl { position: absolute; top: -18px; left: -1px; background: var(--magenta); color: #fff; font-size: 9px; font-weight: 800; padding: 1px 6px; border-radius: 3px 3px 3px 0; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; }

  .ocr-extract { background: #fff; border: 1px solid #ece9ea; border-radius: 12px; padding: 16px 18px; align-self: start; }
  .ocr-extract .head { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; border-bottom: 1px solid #ece9ea; margin-bottom: 14px; }
  .ocr-extract .head h3 { margin: 0; font-size: 14px; color: var(--ink); flex: 1; }
  .ocr-extract .head .agent-tag { font-size: 10.5px; padding: 3px 9px; border-radius: 10px; background: var(--magenta-10); color: var(--magenta-dark); font-weight: 700; }
  .ocr-extract .overall { display: flex; align-items: center; gap: 14px; padding: 12px 14px; background: #fafaf9; border-radius: 8px; margin-bottom: 14px; }
  .ocr-extract .overall .big-conf { width: 56px; height: 56px; border-radius: 50%; border: 4px solid var(--good); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; color: var(--good); flex-shrink: 0; font-size: 16px; }
  .ocr-extract .overall .big-conf.med { border-color: var(--warn); color: var(--warn); }
  .ocr-extract .overall .big-conf.low { border-color: var(--bad); color: var(--bad); }
  .ocr-extract .overall .big-conf .lbl { font-size: 7.5px; font-weight: 700; letter-spacing: .04em; opacity: .8; margin-top: -2px; }
  .ocr-extract .overall .ov-info h4 { margin: 0 0 2px; font-size: 13px; color: var(--ink); }
  .ocr-extract .overall .ov-info p  { margin: 0; font-size: 11.5px; color: var(--gray-700); line-height: 1.45; }

  .ocr-extract h4.sect { margin: 14px 0 6px; font-size: 10.5px; color: var(--magenta-dark); text-transform: uppercase; letter-spacing: .04em; font-weight: 800; }

  .ocr-field { display: grid; grid-template-columns: 110px 1fr 56px; gap: 8px; padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; align-items: center; }
  .ocr-field:hover { background: #fafaf9; }
  .ocr-field.uncertain { background: var(--warn-soft); }
  .ocr-field .lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }
  .ocr-field .val { font-size: 12.5px; color: var(--ink); font-weight: 600; }
  .ocr-field .val.mono { font-family: 'SF Mono', Menlo, monospace; }
  .ocr-field .val .alt { font-size: 10.5px; color: var(--warn); margin-left: 6px; font-style: italic; }
  .ocr-field .conf { font-size: 10.5px; font-weight: 800; padding: 2px 6px; border-radius: 10px; text-align: center; min-width: 38px; font-family: 'SF Mono', Menlo, monospace; }
  .ocr-field .conf.high { background: var(--good-soft); color: var(--good); }
  .ocr-field .conf.med  { background: var(--warn-soft); color: var(--warn); }
  .ocr-field .conf.low  { background: var(--bad-soft); color: var(--bad); }

  .ocr-lines-tbl { width: 100%; border-collapse: collapse; font-size: 11.5px; margin-top: 4px; }
  .ocr-lines-tbl th { text-align: left; font-size: 9.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); padding: 6px 6px; border-bottom: 1px solid #ece9ea; font-weight: 700; }
  .ocr-lines-tbl td { padding: 7px 6px; border-bottom: 1px solid #f5f3f4; }
  .ocr-lines-tbl td.amt { text-align: right; font-family: 'SF Mono', Menlo, monospace; font-weight: 600; }
  .ocr-lines-tbl tr.uncertain td { background: var(--warn-soft); }

  .ocr-pipeline { background: #fafaf9; border-radius: 8px; padding: 12px 14px; margin-top: 14px; }
  .ocr-pipeline h5 { margin: 0 0 8px; font-size: 10.5px; color: var(--magenta-dark); text-transform: uppercase; letter-spacing: .04em; font-weight: 800; }
  .ocr-pipeline .steps { display: flex; gap: 4px; align-items: stretch; }
  .ocr-pipeline .stp { flex: 1; padding: 7px 8px; background: #fff; border: 1px solid #ece9ea; border-radius: 5px; font-size: 10.5px; color: var(--gray-700); position: relative; }
  .ocr-pipeline .stp.ok::before  { content: "✓"; color: var(--good); font-weight: 800; margin-right: 4px; }
  .ocr-pipeline .stp.warn::before{ content: "⚠"; color: var(--warn); font-weight: 800; margin-right: 4px; }
  .ocr-pipeline .stp.bad::before { content: "✕"; color: var(--bad); font-weight: 800; margin-right: 4px; }
  .ocr-pipeline .stp .name { font-weight: 700; color: var(--ink); display: block; font-size: 10.5px; margin-bottom: 1px; }
  .ocr-pipeline .stp .ms   { font-size: 9.5px; color: var(--muted); font-family: 'SF Mono', Menlo, monospace; }

  .ocr-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; padding-top: 12px; border-top: 1px solid #ece9ea; }
  .ocr-actions button { padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; border: 0; }
  .ocr-actions .primary { background: var(--magenta-dark); color: #fff; }
  .ocr-actions .primary:hover { background: #6a1c3d; }
  .ocr-actions .primary:disabled { background: #d8d5d6; cursor: not-allowed; }
  .ocr-actions .secondary { background: #fff; border: 1px solid #ece9ea; color: var(--ink); }
  .ocr-actions .secondary:hover { border-color: var(--magenta-40); }
  .ocr-actions .reject { background: #fff; border: 1px solid #ece9ea; color: var(--bad); }
  .ocr-actions .reject:hover { background: var(--bad-soft); border-color: var(--bad); }
  .ocr-actions .promoted { font-size: 11px; color: var(--good); padding: 7px 12px; background: var(--good-soft); border-radius: 6px; font-weight: 700; }

  .ocr-empty { padding: 60px 20px; text-align: center; color: var(--muted); }
  .ocr-empty .ic { font-size: 40px; opacity: .35; margin-bottom: 10px; }

  /* --- Procurement-to-Pay Timeline --- */
  .tl-hero { background: linear-gradient(135deg, #1c2930 0%, #2d4a52 100%); color: #fff; border-radius: 14px; padding: 22px 28px; margin-bottom: 18px; }
  .tl-hero h2 { margin: 0 0 6px; font-size: 22px; letter-spacing: -0.3px; }
  .tl-hero .sub { margin: 0 0 18px; font-size: 13px; opacity: .9; max-width: 760px; line-height: 1.55; }
  .tl-hero .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .tl-hero .stat .lbl { font-size: 10.5px; opacity: .75; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }
  .tl-hero .stat .val { font-size: 26px; font-weight: 700; line-height: 1.1; margin-top: 2px; }
  .tl-hero .stat .val.accent { color: #7dd3c0; }
  .tl-hero .stat .det { font-size: 11px; opacity: .8; margin-top: 2px; }

  .tl-layout { display: grid; grid-template-columns: 320px 1fr; gap: 18px; }

  .tl-picker { background: #fff; border: 1px solid #ece9ea; border-radius: 12px; overflow: hidden; align-self: start; }
  .tl-picker-hdr { padding: 12px 14px; border-bottom: 1px solid #ece9ea; background: #fafaf9; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }
  .tl-pick { padding: 12px 14px; border-bottom: 1px solid #f5f3f4; cursor: pointer; transition: background .12s; }
  .tl-pick:hover { background: var(--magenta-10); }
  .tl-pick.selected { background: var(--magenta-10); border-left: 3px solid var(--magenta); padding-left: 11px; }
  .tl-pick .ttl { font-size: 12.5px; font-weight: 700; color: var(--ink); }
  .tl-pick .vnd { font-size: 11px; color: var(--gray-700); margin-top: 2px; }
  .tl-pick .meta { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
  .tl-pick .badge { font-size: 9.5px; font-weight: 800; padding: 2px 7px; border-radius: 10px; }
  .tl-pick .badge.done    { background: var(--good-soft); color: var(--good); }
  .tl-pick .badge.flight  { background: #e0e1ff; color: #3a3a99; }
  .tl-pick .badge.delayed { background: var(--warn-soft); color: var(--warn); }
  .tl-pick .cycle { font-size: 10.5px; color: var(--muted); font-family: 'SF Mono', Menlo, monospace; margin-left: auto; }

  .tl-main { background: #fff; border: 1px solid #ece9ea; border-radius: 12px; padding: 22px 26px; }
  .tl-doc-hdr { display: flex; align-items: flex-start; gap: 14px; padding-bottom: 16px; border-bottom: 1px solid #ece9ea; margin-bottom: 20px; }
  .tl-doc-hdr .icon { width: 46px; height: 46px; border-radius: 10px; background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dark) 100%); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; flex-shrink: 0; }
  .tl-doc-hdr .info { flex: 1; }
  .tl-doc-hdr h2 { margin: 0 0 4px; font-size: 18px; color: var(--ink); }
  .tl-doc-hdr .meta { font-size: 12px; color: var(--gray-700); display: flex; gap: 14px; flex-wrap: wrap; }
  .tl-doc-hdr .meta b { color: var(--magenta-dark); }
  .tl-doc-hdr .amount { text-align: right; flex-shrink: 0; }
  .tl-doc-hdr .amount .val { font-size: 22px; font-weight: 800; color: var(--ink); font-family: 'SF Mono', Menlo, monospace; }
  .tl-doc-hdr .amount .lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 700; margin-top: 2px; }

  /* Phase bar overview (horizontal) */
  .tl-phases { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-bottom: 28px; position: relative; }
  .tl-phases::before { content: ""; position: absolute; left: 0; right: 0; top: 16px; height: 3px; background: #ece9ea; border-radius: 2px; z-index: 0; }
  .tl-phase { text-align: center; position: relative; z-index: 1; cursor: pointer; padding-bottom: 4px; }
  .tl-phase .dot { width: 34px; height: 34px; border-radius: 50%; background: #ece9ea; color: #a8a4a5; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; border: 3px solid #fff; box-shadow: 0 0 0 1px #ece9ea; transition: all .15s; }
  .tl-phase.done .dot   { background: var(--good); color: #fff; box-shadow: 0 0 0 1px var(--good); }
  .tl-phase.active .dot { background: var(--magenta); color: #fff; box-shadow: 0 0 0 1px var(--magenta); animation: tlActive 1.8s infinite ease-in-out; }
  @keyframes tlActive { 0%, 100% { box-shadow: 0 0 0 1px var(--magenta), 0 0 0 0 var(--magenta-40); } 50% { box-shadow: 0 0 0 1px var(--magenta), 0 0 0 6px rgba(206,15,105,.18); } }
  .tl-phase.delayed .dot { background: var(--warn); color: #fff; box-shadow: 0 0 0 1px var(--warn); }
  .tl-phase .lbl { font-size: 10.5px; color: var(--ink); font-weight: 700; line-height: 1.25; }
  .tl-phase .when { font-size: 9.5px; color: var(--muted); margin-top: 2px; font-family: 'SF Mono', Menlo, monospace; }
  .tl-phase:hover .dot { transform: scale(1.08); }
  .tl-phase.pending .lbl { color: var(--muted); }

  /* Vertical event timeline */
  .tl-events { position: relative; padding-left: 30px; }
  .tl-events::before { content: ""; position: absolute; left: 12px; top: 8px; bottom: 8px; width: 2px; background: linear-gradient(180deg, var(--magenta-10) 0%, #ece9ea 50%, #ece9ea 100%); border-radius: 1px; }
  .tl-evt { position: relative; padding: 10px 0 22px; }
  .tl-evt::before { content: ""; position: absolute; left: -25px; top: 14px; width: 14px; height: 14px; border-radius: 50%; background: #fff; border: 3px solid var(--good); }
  .tl-evt.flight::before { border-color: var(--magenta); animation: tlActive2 1.6s infinite ease-in-out; }
  @keyframes tlActive2 { 0%, 100% { box-shadow: 0 0 0 0 rgba(206,15,105,.4); } 50% { box-shadow: 0 0 0 5px rgba(206,15,105,0); } }
  .tl-evt.warn::before { border-color: var(--warn); }
  .tl-evt.future::before { border-color: #d8d5d6; background: #fafaf9; }
  .tl-evt-card { background: #fafaf9; border-radius: 10px; padding: 12px 16px; border-left: 3px solid var(--good); }
  .tl-evt.flight .tl-evt-card { background: var(--magenta-10); border-left-color: var(--magenta); }
  .tl-evt.warn .tl-evt-card { background: var(--warn-soft); border-left-color: var(--warn); }
  .tl-evt.future .tl-evt-card { background: #fff; border-left-color: #d8d5d6; opacity: .6; border: 1px dashed #ece9ea; border-left: 3px dashed #d8d5d6; }
  .tl-evt-card .top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .tl-evt-card h4 { margin: 0; font-size: 13px; color: var(--ink); flex: 1; }
  .tl-evt-card .actor-pill { font-size: 10px; padding: 3px 9px; border-radius: 11px; font-weight: 800; letter-spacing: .03em; text-transform: uppercase; }
  .tl-evt-card .actor-pill.agent { background: var(--magenta-10); color: var(--magenta-dark); }
  .tl-evt-card .actor-pill.human { background: #d8eef9; color: #1e5b8a; }
  .tl-evt-card .actor-pill.system { background: #e0e1ff; color: #3a3a99; }
  .tl-evt-card .actor-pill.vendor { background: #fde8c2; color: #8a5a14; }
  .tl-evt-card .when { font-size: 10.5px; color: var(--muted); font-family: 'SF Mono', Menlo, monospace; }
  .tl-evt-card .desc { font-size: 12px; color: var(--gray-700); line-height: 1.5; margin: 6px 0; }
  .tl-evt-card .evidence { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tl-evt-card .evidence .ev { font-size: 10.5px; padding: 3px 9px; background: #fff; border: 1px solid #ece9ea; border-radius: 10px; color: var(--gray-700); font-weight: 600; }
  .tl-evt-card .evidence .ev .k { color: var(--muted); margin-right: 4px; font-size: 9.5px; text-transform: uppercase; letter-spacing: .03em; }
  .tl-evt-card .duration { font-size: 10.5px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .tl-evt-card .delay { color: var(--warn); font-weight: 700; }

  .tl-section-hdr { font-size: 11px; color: var(--magenta-dark); text-transform: uppercase; letter-spacing: .05em; font-weight: 800; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px dashed #ece9ea; }

  .tl-sla { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 22px; padding-top: 18px; border-top: 1px solid #ece9ea; }
  .tl-sla .cell { background: #fafaf9; border-radius: 8px; padding: 12px 14px; }
  .tl-sla .cell .lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }
  .tl-sla .cell .val { font-size: 17px; font-weight: 800; color: var(--ink); margin-top: 3px; font-family: 'SF Mono', Menlo, monospace; }
  .tl-sla .cell .val.good { color: var(--good); }
  .tl-sla .cell .val.warn { color: var(--warn); }
  .tl-sla .cell .det { font-size: 11px; color: var(--gray-700); margin-top: 2px; }

  /* --- Continuous learning dashboard --- */
  .learn-hero { padding: 22px 24px; background: linear-gradient(135deg, var(--magenta-10) 0%, #fff 70%); border: 1px solid var(--magenta-40); border-radius: 12px; margin-bottom: 18px; }
  .learn-hero h2 { margin: 0 0 4px; font-size: 22px; color: var(--magenta-dark); }
  .learn-hero .sub { margin: 0 0 14px; color: var(--gray-700); font-size: 13.5px; }
  .learn-hero .heroline { display: flex; gap: 32px; flex-wrap: wrap; }
  .learn-hero .heroline .item { display: flex; flex-direction: column; gap: 2px; }
  .learn-hero .heroline .item .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }
  .learn-hero .heroline .item .val { font-size: 22px; font-weight: 700; color: var(--magenta-dark); }
  .learn-hero .heroline .item .delta { font-size: 11px; color: var(--good); font-weight: 700; }
  .learn-hero .heroline .item .delta.bad { color: var(--bad); }

  .learn-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; margin-bottom: 16px; }
  .learn-card { background: #fff; border: 1px solid #ece9ea; border-radius: 10px; padding: 18px 20px; }
  .learn-card h3 { margin: 0 0 4px; font-size: 14px; color: var(--magenta-dark); }
  .learn-card .sub { margin: 0 0 14px; font-size: 11.5px; color: var(--muted); }

  .trend-chart { position: relative; height: 200px; padding: 12px 0 24px; }
  .trend-chart svg { width: 100%; height: 100%; overflow: visible; }
  .trend-chart .axis { stroke: #ece9ea; stroke-width: 1; }
  .trend-chart .grid { stroke: #f5f3f4; stroke-width: 1; }
  .trend-chart .ax-label { font-size: 10px; fill: var(--muted); }
  .trend-chart .line-auto { fill: none; stroke: var(--good); stroke-width: 2.4; }
  .trend-chart .line-exc  { fill: none; stroke: var(--bad);  stroke-width: 2.4; }
  .trend-chart .dot-auto  { fill: var(--good); }
  .trend-chart .dot-exc   { fill: var(--bad); }
  .trend-chart .area-auto { fill: var(--good); opacity: .08; }
  .trend-legend { display: flex; gap: 14px; font-size: 11px; color: var(--muted); margin-top: 6px; }
  .trend-legend .key { display: inline-flex; align-items: center; gap: 5px; }
  .trend-legend .key .sw { width: 12px; height: 3px; border-radius: 2px; }
  .trend-legend .key.auto .sw { background: var(--good); }
  .trend-legend .key.exc  .sw { background: var(--bad); }

  .retrain-list { list-style: none; padding: 0; margin: 0; }
  .retrain-list li { padding: 10px 0; border-top: 1px dashed #ece9ea; display: flex; gap: 10px; align-items: flex-start; font-size: 12.5px; line-height: 1.45; }
  .retrain-list li:first-child { border-top: 0; padding-top: 0; }
  .retrain-list li .when { font-size: 10px; color: var(--muted); flex-shrink: 0; width: 64px; text-transform: uppercase; font-weight: 700; letter-spacing: .04em; padding-top: 2px; }
  .retrain-list li .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--magenta); flex-shrink: 0; margin-top: 6px; }
  .retrain-list li .dot.good { background: var(--good); }
  .retrain-list li .body { flex: 1; }
  .retrain-list li .body strong { color: var(--magenta-dark); }
  .retrain-list li .body .det { color: var(--muted); font-size: 11px; display: block; margin-top: 2px; }

  .corrections-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .corrections-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); padding: 8px 6px; border-bottom: 1px solid #ece9ea; }
  .corrections-table td { padding: 10px 6px; border-bottom: 1px solid #f5f3f4; vertical-align: middle; }
  .corrections-table td .from { color: var(--muted); text-decoration: line-through; }
  .corrections-table td .arr  { color: var(--warn); margin: 0 4px; font-weight: 700; }
  .corrections-table td .to   { color: var(--good); font-weight: 600; }
  .corrections-table td .vendor { font-weight: 600; color: var(--ink); }
  .corrections-table td.sm { color: var(--muted); font-size: 11px; }
  .corrections-table tr.empty td { padding: 22px 6px; text-align: center; color: var(--muted); }

  .vendor-consistency { display: flex; flex-direction: column; gap: 10px; }
  .vendor-consistency .v-row { display: grid; grid-template-columns: 1fr 110px 56px; gap: 10px; align-items: center; }
  .vendor-consistency .v-row .name { font-size: 12.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vendor-consistency .v-row .bar { height: 6px; border-radius: 3px; background: #f0eef0; overflow: hidden; }
  .vendor-consistency .v-row .bar .fill { height: 100%; background: linear-gradient(90deg, var(--good) 0%, var(--good) 60%, var(--warn) 80%, var(--bad) 100%); }
  .vendor-consistency .v-row .pct { text-align: right; font-size: 12px; font-weight: 700; color: var(--magenta-dark); }

  .learn-insights { background: linear-gradient(135deg, #fafaf9 0%, #fff 100%); border: 1px solid #ece9ea; border-left: 4px solid var(--magenta); border-radius: 10px; padding: 16px 20px; margin-top: 16px; }
  .learn-insights h3 { margin: 0 0 8px; font-size: 13px; color: var(--magenta-dark); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }
  .learn-insights ul { margin: 0; padding: 0; list-style: none; }
  .learn-insights li { padding: 8px 0; border-top: 1px dashed #ece9ea; font-size: 13px; color: var(--gray-700); line-height: 1.55; }
  .learn-insights li:first-child { border-top: 0; }
  .learn-insights li strong { color: var(--magenta-dark); }

  /* --- Comms Agent inbox --- */
  .comms-wrap { display: grid; grid-template-columns: 380px 1fr; gap: 16px; height: calc(100vh - 220px); min-height: 600px; }
  .comms-list { background: #fff; border: 1px solid #ece9ea; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
  .comms-list .filters { display: flex; gap: 0; padding: 4px; background: #fafaf9; border-bottom: 1px solid #ece9ea; }
  .comms-list .filters button { flex: 1; background: transparent; border: 0; padding: 8px 6px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-radius: 6px; position: relative; }
  .comms-list .filters button.active { background: #fff; color: var(--magenta-dark); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  .comms-list .filters button .ct { display: inline-block; margin-left: 4px; padding: 1px 6px; border-radius: 8px; font-size: 10px; background: var(--magenta-10); color: var(--magenta-dark); font-weight: 700; }
  .comms-list .scroll { overflow-y: auto; flex: 1; }

  .comms-item { padding: 12px 14px; border-bottom: 1px solid #f0eef0; cursor: pointer; transition: background .12s; }
  .comms-item:hover { background: #faf6f8; }
  .comms-item.active { background: var(--magenta-10); border-left: 3px solid var(--magenta); padding-left: 11px; }
  .comms-item .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 4px; }
  .comms-item .top .to { font-size: 12px; font-weight: 700; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .comms-item .top .when { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .comms-item .subj { font-size: 12.5px; color: var(--gray-700); margin-bottom: 4px; line-height: 1.3; }
  .comms-item .meta { display: flex; gap: 6px; align-items: center; font-size: 10px; }
  .comms-item .meta .pill { padding: 2px 7px; border-radius: 8px; font-weight: 700; }
  .comms-item .meta .pill.draft     { background: #eef0f3; color: var(--gray-700); }
  .comms-item .meta .pill.sent      { background: var(--good-soft); color: var(--good); }
  .comms-item .meta .pill.awaiting  { background: var(--warn-soft); color: var(--warn); }
  .comms-item .meta .pill.replied   { background: #e8e1f0; color: #6b3aa0; }
  .comms-item .meta .pill.kind      { background: var(--magenta-10); color: var(--magenta-dark); }
  .comms-item .preview { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; max-height: 30px; overflow: hidden; }

  .comms-detail { background: #fff; border: 1px solid #ece9ea; border-radius: 10px; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; }
  .comms-detail .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 14px; }
  .comms-detail .empty .icon { font-size: 48px; color: #ece9ea; margin-bottom: 12px; }
  .comms-detail .hdr { padding-bottom: 18px; border-bottom: 1px solid #ece9ea; margin-bottom: 18px; }
  .comms-detail .hdr h2 { margin: 0 0 8px; font-size: 17px; color: var(--ink); }
  .comms-detail .hdr .meta-row { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--gray-700); align-items: center; }
  .comms-detail .hdr .meta-row .lbl { color: var(--muted); margin-right: 4px; }
  .comms-detail .hdr .meta-row strong { color: var(--magenta-dark); }
  .comms-detail .ctx-link { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; background: var(--magenta-10); color: var(--magenta-dark); text-decoration: none; font-size: 11px; font-weight: 700; cursor: pointer; }
  .comms-detail .ctx-link:hover { background: var(--magenta-40); }
  .comms-detail .body { font-size: 13.5px; color: var(--ink); line-height: 1.7; flex: 1; }
  .comms-detail textarea.body-edit { width: 100%; min-height: 280px; padding: 14px; border: 1px solid #d8d5d6; border-radius: 8px; font-family: inherit; font-size: 13.5px; line-height: 1.7; resize: vertical; }
  .comms-detail .actions { padding-top: 18px; border-top: 1px solid #ece9ea; margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .comms-detail .actions .right { margin-left: auto; display: flex; gap: 8px; }

  .comms-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .comms-stats .stat { padding: 14px 16px; background: #fff; border: 1px solid #ece9ea; border-radius: 10px; }
  .comms-stats .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 700; margin-bottom: 6px; }
  .comms-stats .stat .val { font-size: 22px; font-weight: 700; color: var(--magenta-dark); }
  .comms-stats .stat .val.ok  { color: var(--good); }
  .comms-stats .stat .val.warn { color: var(--warn); }
  .comms-stats .stat .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .comms-bulkbar { background: var(--magenta-10); border: 1px solid var(--magenta-40); padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .comms-bulkbar .count { font-weight: 700; color: var(--magenta-dark); }
  .comms-bulkbar .clear { background: transparent; border: 0; cursor: pointer; color: var(--magenta-dark); margin-left: auto; text-decoration: underline; font-size: 12px; }

  .comms-empty-state { padding: 60px 24px; text-align: center; color: var(--muted); }
  .comms-empty-state .icon { font-size: 36px; opacity: .4; margin-bottom: 12px; }

  /* --- 3-way match variance UI --- */
  .match3 { margin-top: 14px; }
  .match3 .legend { display: flex; gap: 14px; font-size: 11px; color: var(--muted); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed #ece9ea; }
  .match3 .legend .key { display: inline-flex; align-items: center; gap: 5px; }
  .match3 .legend .key .sw { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .match3 .legend .key .po  .sw { background: var(--magenta-10); border: 1px solid var(--magenta-40); }
  .match3 .legend .key .gr  .sw { background: #e6f3ec; border: 1px solid #c8e3d2; }
  .match3 .legend .key .inv .sw { background: #eef0f3; border: 1px solid #d8dde4; }

  .match3-line { padding: 14px; border: 1px solid #ece9ea; border-radius: 10px; margin-bottom: 12px; background: #fff; }
  .match3-line.ok       { border-left: 4px solid var(--good); }
  .match3-line.variance { border-left: 4px solid var(--bad); background: #fffafa; }
  .match3-line .ttl { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-weight: 600; color: var(--magenta-dark); }
  .match3-line .ttl .ln { padding: 2px 8px; border-radius: 4px; background: var(--magenta-10); color: var(--magenta-dark); font-size: 11px; font-weight: 700; }
  .match3-line .ttl .desc { flex: 1; color: var(--ink); font-weight: 500; }
  .match3-line .ttl .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .match3-line .ttl .badge.ok   { background: var(--good-soft); color: var(--good); border: 1px solid #c8e3d2; }
  .match3-line .ttl .badge.bad  { background: var(--bad-soft);  color: var(--bad);  border: 1px solid #f1c1bd; }

  .match3-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .match3-grid .col { padding: 12px; border-radius: 8px; }
  .match3-grid .col.po  { background: var(--magenta-10); border: 1px solid var(--magenta-40); }
  .match3-grid .col.gr  { background: #f3faf6; border: 1px solid #c8e3d2; }
  .match3-grid .col.inv { background: #fafbfc; border: 1px solid #d8dde4; }
  .match3-grid .col .src { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .match3-grid .col.po  .src { color: var(--magenta-dark); }
  .match3-grid .col.gr  .src { color: var(--good); }
  .match3-grid .col.inv .src { color: var(--gray-700); }
  .match3-grid .col .src .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .match3-grid .row { display: grid; grid-template-columns: 56px 1fr; gap: 4px; padding: 3px 0; font-size: 12px; align-items: baseline; }
  .match3-grid .row .lbl { color: var(--muted); font-size: 11px; }
  .match3-grid .row .val { font-weight: 600; color: var(--ink); }
  .match3-grid .row .val.diff { color: var(--bad); }
  .match3-grid .row .val.match { color: var(--good); }

  .match3-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; padding: 12px 14px; background: #fafaf9; border: 1px solid #ece9ea; border-radius: 8px; }
  .match3-summary .cell { display: flex; flex-direction: column; gap: 2px; }
  .match3-summary .cell .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; }
  .match3-summary .cell .val { font-size: 14px; font-weight: 700; color: var(--ink); }
  .match3-summary .cell .val.bad { color: var(--bad); }
  .match3-summary .cell .val.ok  { color: var(--good); }

  .match3-toggle { display: inline-flex; gap: 2px; padding: 3px; border-radius: 8px; background: #eef0f3; }
  .match3-toggle button { background: transparent; border: 0; padding: 5px 12px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-radius: 6px; }
  .match3-toggle button.active { background: #fff; color: var(--magenta-dark); box-shadow: 0 1px 2px rgba(0,0,0,.06); }

  /* --- coding panel explainability + AI vs human audit --- */
  .reasons { margin-top: 14px; padding: 12px 14px; background: #fafaf9; border: 1px solid #ece9ea; border-radius: 8px; }
  .reasons .hdr { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--magenta-dark); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
  .reasons ol { margin: 0; padding-left: 0; list-style: none; counter-reset: r; }
  .reasons li { counter-increment: r; padding: 7px 0 7px 28px; position: relative; font-size: 12.5px; color: var(--gray-700); border-top: 1px dashed #e8e6e7; line-height: 1.5; }
  .reasons li:first-child { border-top: 0; }
  .reasons li::before { content: counter(r); position: absolute; left: 0; top: 7px; width: 20px; height: 20px; border-radius: 50%; background: var(--magenta); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .reasons li strong { color: var(--magenta-dark); }
  .reasons li .weight { display: inline-block; margin-left: 6px; padding: 1px 6px; font-size: 10px; font-weight: 700; border-radius: 8px; background: var(--magenta-10); color: var(--magenta-dark); }

  .audit-block { margin-top: 12px; padding: 10px 14px; background: var(--warn-soft); border: 1px solid #f0d9a8; border-left: 3px solid var(--warn); border-radius: 6px; }
  .audit-block .hdr { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--warn); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
  .audit-block .diff { display: grid; grid-template-columns: 80px 1fr 22px 1fr; gap: 8px; align-items: center; font-size: 12px; padding: 4px 0; }
  .audit-block .diff .fld { font-weight: 600; color: var(--gray-700); text-transform: capitalize; }
  .audit-block .diff .ai  { padding: 3px 8px; background: #fff; border: 1px dashed #d8d5d6; border-radius: 4px; color: var(--muted); text-decoration: line-through; }
  .audit-block .diff .arr { text-align: center; color: var(--warn); font-weight: 700; }
  .audit-block .diff .you { padding: 3px 8px; background: #fff; border: 1px solid var(--good); border-radius: 4px; color: var(--good); font-weight: 600; }
  .audit-block .meta { margin-top: 8px; font-size: 11px; color: var(--muted); }

  /* --- queue bulk actions + SLA + advanced search --- */
  .sla-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; border: 1px solid transparent; }
  .sla-pill.ok    { background: var(--good-soft); color: var(--good);  border-color: #c8e3d2; }
  .sla-pill.soon  { background: var(--warn-soft); color: var(--warn);  border-color: #f0d9a8; }
  .sla-pill.over  { background: var(--bad-soft);  color: var(--bad);   border-color: #f1c1bd; }
  .sla-pill.paid  { background: #eef0f3;          color: var(--muted); border-color: #d8dde4; }
  .sla-pill .dot  { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .9; }

  .q-bulkbar { position: sticky; top: 56px; z-index: 30; background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dark) 100%); color: #fff; border-radius: 12px; padding: 12px 18px; margin: 12px 0 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 6px 18px rgba(206,15,105,.22), 0 2px 4px rgba(0,0,0,.06); flex-wrap: wrap; }
  .q-bulkbar .inner { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; background: var(--magenta-10); border: 1px solid var(--magenta-40); box-shadow: 0 1px 2px rgba(125,34,72,.06); }
  .q-bulkbar .count { font-weight: 700; color: var(--magenta-dark); }
  .q-bulkbar .sep { width: 1px; height: 22px; background: var(--magenta-40); }
  .q-bulkbar .btn { padding: 6px 12px; font-size: 12px; }
  .q-bulkbar .clear { margin-left: auto; background: transparent; border: 0; color: var(--magenta-dark); cursor: pointer; font-size: 12px; text-decoration: underline; }

  .q-advanced-toggle { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; background: #fff; border: 1px solid #e1dfe5; color: var(--magenta-dark); font-size: 12px; cursor: pointer; font-weight: 600; }
  .q-advanced-toggle:hover { background: #faf6f8; }
  .q-advanced-toggle.on { background: var(--magenta-10); border-color: var(--magenta-40); }

  .q-advanced { margin-top: 10px; padding: 14px; border-radius: 10px; background: #fafaf9; border: 1px solid #ece9ea; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 16px; }
  .q-advanced .field { display: flex; flex-direction: column; gap: 4px; }
  .q-advanced .field label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .q-advanced .field input, .q-advanced .field select { padding: 6px 8px; font-size: 13px; border: 1px solid #d8d5d6; border-radius: 6px; background: #fff; }
  .q-advanced .range { display: grid; grid-template-columns: 1fr 12px 1fr; align-items: center; gap: 6px; }
  .q-advanced .range .dash { text-align: center; color: var(--muted); }
  .q-advanced .actions { grid-column: 1 / -1; display: flex; gap: 8px; justify-content: flex-end; }

  .q-active-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .q-active-filters .chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px 3px 10px; font-size: 11px; background: #fff; border: 1px solid var(--magenta-40); border-radius: 12px; color: var(--magenta-dark); }
  .q-active-filters .chip .x { cursor: pointer; font-weight: 700; opacity: .7; }
  .q-active-filters .chip .x:hover { opacity: 1; }

  .q-row-check { width: 32px; padding-right: 0 !important; }
  .q-row-check input { transform: scale(1.1); cursor: pointer; }
  tr.row.q-selected { background: var(--magenta-10) !important; }
  tr.row.q-selected td:first-child { box-shadow: inset 3px 0 0 var(--magenta); }

  .q-bulk-result { padding: 10px 14px; border-radius: 8px; background: var(--good-soft); border: 1px solid #c8e3d2; color: var(--good); font-size: 13px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .q-bulk-result .x { margin-left: auto; cursor: pointer; opacity: .6; }

  .q-row-age { color: var(--muted); font-size: 11px; }
  .q-conf-chip {
    display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px;
    font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .q-conf-chip.high { background: rgba(5,150,105,0.12); color: #047857; }
  .q-conf-chip.med  { background: rgba(217,119,6,0.14); color: #b45309; }
  .q-conf-chip.low  { background: rgba(220,38,38,0.12); color: #b91c1c; }

  /* ============================================================
     Guide me — role picker
     ============================================================ */
  .guide-picker {
    background: var(--white); border-radius: 16px; max-width: 1080px;
    width: 92vw; max-height: 88vh; overflow-y: auto;
    padding: 36px 36px 28px; position: relative;
    box-shadow: 0 30px 80px rgba(15, 15, 25, 0.45);
    font-family: Arial, sans-serif;
  }
  .guide-picker .gp-close {
    position: absolute; top: 14px; right: 18px;
    background: transparent; border: none; color: var(--muted);
    font-size: 28px; cursor: pointer; line-height: 1;
    width: 36px; height: 36px; border-radius: 50%;
  }
  .guide-picker .gp-close:hover { background: var(--gray-100); color: var(--text); }
  .guide-picker .gp-head { text-align: center; margin-bottom: 24px; }
  .guide-picker .gp-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.6px;
    color: var(--magenta); font-weight: 800; margin-bottom: 10px;
  }
  .guide-picker .gp-eyebrow .dot {
    width: 8px; height: 8px; background: var(--magenta); border-radius: 50%;
    box-shadow: 0 0 0 4px var(--magenta-10); animation: pulse 1.6s infinite;
  }
  .guide-picker h2 {
    font-family: "Lato", Arial, sans-serif; font-size: 28px; font-weight: 900;
    color: var(--magenta-dark); margin: 0 0 8px; letter-spacing: -0.3px;

  .guide-picker .gp-head p {
    margin: 0 auto; max-width: 560px; color: var(--gray-700); font-size: 14px; line-height: 1.6;
  }

  .guide-picker .gp-cards {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 24px 0 18px;
  }
  @media (max-width: 1000px) { .guide-picker .gp-cards { grid-template-columns: 1fr; } }

  .guide-picker .gp-card {
    background: var(--white); border: 1.5px solid var(--border); border-radius: 14px;
    padding: 22px 22px 20px; cursor: pointer; text-align: left;
    font-family: Arial, sans-serif; color: var(--text); position: relative;
    transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    display: flex; flex-direction: column; gap: 8px;
  }
  .guide-picker .gp-card:hover {
    transform: translateY(-2px);
    border-color: var(--magenta);
    box-shadow: 0 14px 30px rgba(125, 34, 72, 0.15);
  }
  .guide-picker .gp-card .gp-ico {
    width: 48px; height: 48px; border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: "Lato", Arial, sans-serif; font-size: 24px; font-weight: 900;
    margin-bottom: 4px;
  }
  .guide-picker .gp-general .gp-ico { background: var(--magenta-10); color: var(--magenta-dark); }
  .guide-picker .gp-manager .gp-ico { background: rgba(37,99,235,0.12); color: #1d4ed8; }
  .guide-picker .gp-accountant .gp-ico { background: rgba(5,150,105,0.14); color: #047857; }
  .guide-picker .gp-card .gp-role {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.4px; font-weight: 800;
    color: var(--muted);
  }
  .guide-picker .gp-card h3 {
    font-family: "Lato", Arial, sans-serif; font-size: 18px; font-weight: 900;
    margin: 0; color: var(--magenta-dark); line-height: 1.25; letter-spacing: -0.2px;
  }
  .guide-picker .gp-card p {
    margin: 0; color: var(--gray-700); font-size: 13px; line-height: 1.55; flex: 1;
  }
  .guide-picker .gp-card .gp-meta {
    display: flex; flex-direction: column; gap: 4px; margin-top: 6px;
    padding-top: 10px; border-top: 1px solid var(--border);
    font-size: 11.5px; color: var(--muted);
  }
  .guide-picker .gp-card .gp-meta span { display: inline-flex; align-items: center; gap: 6px; }
  .guide-picker .gp-card .gp-meta .m-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--magenta);
  }
  .guide-picker .gp-card .gp-cta {
    font-size: 12.5px; font-weight: 800; color: var(--magenta);
    margin-top: 8px;
  }
  .guide-picker .gp-card:hover .gp-cta { color: var(--magenta-dark); }

  .guide-picker .gp-foot {
    text-align: center; font-size: 12.5px; color: var(--muted);
    padding-top: 14px; border-top: 1px solid var(--border);
  }
  .guide-picker .gp-foot a {
    color: var(--magenta-dark); font-weight: 700; text-decoration: none;
  }
  .guide-picker .gp-foot a:hover { text-decoration: underline; }

  /* ============================================================
     Cockpit AI — noticed-today + ask bar
     ============================================================ */
  .cp-health.ok { background: rgba(5,150,105,0.10); color: #047857; }
  .cp-health.ok .dot { background: #059669; }
  .cp-health.warn { background: rgba(217,119,6,0.12); color: #b45309; }
  .cp-health.warn .dot { background: #d97706; }
  .cp-health.busy { background: rgba(220,38,38,0.10); color: #b91c1c; }
  .cp-health.busy .dot { background: #dc2626; }

  .cp-ai {
    background: linear-gradient(135deg, rgba(206, 15, 105, 0.045) 0%, rgba(125, 34, 72, 0.02) 100%);
    border: 1px solid var(--magenta-20); border-radius: 14px;
    padding: 16px 18px; margin-bottom: 18px;
  }
  .cp-ai-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .cp-ai-head .ic {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dark) 100%);
    color: var(--white); font-size: 13px; font-weight: 900;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cp-ai-head .ttl {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 800;
    color: var(--magenta-dark);
  }
  .cp-ai-head .pulse {
    width: 7px; height: 7px; background: var(--magenta); border-radius: 50%;
    box-shadow: 0 0 0 3px var(--magenta-10); animation: pulse 1.4s infinite;
  }

    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px;
  }
  @media (max-width: 1000px) { .cp-ai-focus { grid-template-columns: 1fr; } }
  .cp-ai-li {
    background: var(--white); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 13px; font-size: 12.5px; color: var(--gray-700); line-height: 1.5;
    border-left: 3px solid var(--magenta);
  }
  .cp-ai-li strong { color: var(--magenta-dark); }

  .cp-ai-bar {
    background: var(--white); border-radius: 10px; padding: 8px 10px;
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--border-strong);
  }
  .cp-ai-bar .spark {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dark) 100%);

    display: inline-flex; align-items: center; justify-content: center;

    padding: 4px 0;
  }
  .cp-ai-bar input::placeholder { color: var(--gray-600); font-style: italic; }
  .cp-ai-bar .submit {
    background: var(--magenta); color: var(--white); border: none;
    padding: 6px 14px; border-radius: 7px; font-weight: 700; font-size: 12px;
    cursor: pointer; font-family: Arial, sans-serif;
  }
  .cp-ai-bar .submit:hover { background: var(--magenta-dark); }

  .cp-ai-presets {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center;
  }
  .cp-ai-presets .lbl {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); font-weight: 800; margin-right: 4px;
  }
  .cp-ai-presets button {
    background: var(--white); border: 1px solid var(--border-strong); color: var(--gray-700);
    padding: 4px 10px; border-radius: 999px; font-size: 11.5px; cursor: pointer;
    font-family: Arial, sans-serif;
  }
  .cp-ai-presets button:hover {
    border-color: var(--magenta); color: var(--magenta-dark); background: var(--magenta-10);
  }
  .cp-ai-presets button .ic { color: var(--magenta); margin-right: 4px; font-weight: 900; }

  .cp-ai-answer {
    margin-top: 10px; padding: 11px 14px; background: var(--magenta-10);
    border-left: 3px solid var(--magenta); border-radius: 0 8px 8px 0;

  .cp-ai-answer .left strong { color: var(--magenta-dark); }
  .cp-ai-answer button.reset {
    background: var(--white); border: 1px solid var(--magenta-20); color: var(--magenta-dark);
    padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer;
    font-family: Arial, sans-serif; flex-shrink: 0;
  }
  .cp-ai-answer button.reset:hover { background: var(--magenta); color: var(--white); }

  /* ============================================================
     Customizing — hero + AI-assist
     ============================================================ */

    display: flex; justify-content: space-between; align-items: flex-end; gap: 24px;
    flex-wrap: wrap; margin-bottom: 14px;

  .cust-ai-bar {

  }

    margin-left: 10px;

    display: inline-flex; align-items: center; justify-content: center;
  }
