function ocrStatusLabel(s) {
  return ({ extracted: "Extracted", review: "Review", failed: "Failed", promoted: "Promoted" })[s] || s;
}
function ocrConfBucket(c) {
  return c >= 90 ? "high" : c >= 75 ? "med" : "low";
}
function ocrSourceLabel(s) {
  return ({ email: "Email", scan: "Scan", upload: "Portal" })[s] || s;
}

function renderOCR() {
  state.ocr = state.ocr || { selected: null, filter: "all", promoted: {} };
  const filter = state.ocr.filter || "all";
  const promoted = state.ocr.promoted || {};

  const docs = OCR_DOCS.map(d => ({ ...d, status: promoted[d.id] ? "promoted" : d.status }));

  const shown = filter === "all" ? docs : docs.filter(d => d.status === filter || d.source === filter);
  let sel = state.ocr.selected ? docs.find(d => d.id === state.ocr.selected) : (shown[0] || docs[0]);
  if (!sel && shown.length) sel = shown[0];

  // Hero stats
  const total = docs.length;
  const auto  = docs.filter(d => d.overallConf >= 95).length;
  const review= docs.filter(d => d.status === "review").length;
  const failed= docs.filter(d => d.status === "failed").length;
  const avgConf = Math.round(docs.reduce((s, d) => s + d.overallConf, 0) / Math.max(1, docs.length));
  const avgLatency = Math.round(docs.reduce((s, d) => s + d.pipeline.reduce((a, p) => a + p.ms, 0), 0) / Math.max(1, docs.length));

  const rowsHtml = shown.length === 0 ? `<div class="ocr-empty"><div class="ic">📄</div><div>No documents in this filter.</div></div>` :
    shown.map(d => {
      const conf = d.overallConf;
      const bucket = ocrConfBucket(conf);
      const rcv = (d.receivedAt || "").replace("T", " ").slice(0,16);
      return `
      <div class="ocr-row ${sel && sel.id === d.id ? "selected" : ""}" data-action="ocr-select" data-id="${d.id}">
        <div class="thumb"><div class="l"></div><div class="l short"></div><div class="l"></div><div class="l short"></div><div class="l"></div><div class="l amt"></div></div>
        <div class="meta">
          <div class="top">
            <span class="src ${d.source}">${escapeHtml(ocrSourceLabel(d.source))}</span>
            <span class="st ${d.status}">${escapeHtml(ocrStatusLabel(d.status))}</span>
          </div>
          <div class="ttl" title="${escapeHtml(d.fileName)}">${escapeHtml(d.fileName)}</div>
          <div class="det">${escapeHtml(d.vendorName)} · ${escapeHtml(rcv)}</div>
          <div class="conf-bar"><div class="fill ${bucket === "med" ? "low" : bucket === "low" ? "bad" : ""}" style="width: ${conf}%;"></div></div>
        </div>
      </div>`;
    }).join("");

  // Detail
  let detailHtml;
  if (!sel) {
    detailHtml = `<div class="ocr-empty"><div class="ic">👁</div><div>Pick a document to see the extraction.</div></div>`;
  } else {
    const overallBucket = ocrConfBucket(sel.overallConf);
    const isPromoted = !!promoted[sel.id];
    const linesHtml = sel.lines.length === 0 ? `<div style="font-size:11.5px;color:var(--muted);padding:8px 0;">No lines extracted.</div>` : `
      <table class="ocr-lines-tbl">
        <thead><tr><th>Description</th><th style="width:42px;text-align:right;">Qty</th><th style="width:74px;text-align:right;">Unit</th><th style="width:88px;text-align:right;">Amount</th><th style="width:46px;text-align:right;">Conf</th></tr></thead>
        <tbody>
          ${sel.lines.map(l => `
            <tr class="${l.uncertain || l.conf < 75 ? "uncertain" : ""}">
              <td>${escapeHtml(l.desc)}</td>
              <td class="amt">${l.qty}</td>
              <td class="amt">${formatMoney(l.unit, sel.currency).replace(/^[^\d-]+/, "")}</td>
              <td class="amt">${formatMoney(l.amt, sel.currency)}</td>
              <td class="amt"><span class="conf ${ocrConfBucket(l.conf)}" style="display:inline-block;">${l.conf}</span></td>
            </tr>`).join("")}
        </tbody>
      </table>`;

    // Build the simulated scanned-doc preview
    const bboxesHtml = (sel.bboxes || []).map(b => `
      <div class="ocr-bbox" style="top: ${b.top}px; left: ${b.left}px; width: ${b.width}px; height: ${b.height}px;">
        <span class="bb-lbl">${escapeHtml(b.label)}</span>
      </div>`).join("");

    const linesPreviewHtml = sel.lines.length === 0 ? `
      <tr><td colspan="4" style="color:#a8a4a5;font-style:italic;padding:14px;">— page content too degraded to extract —</td></tr>` :
      sel.lines.map(l => `
        <tr>
          <td>${escapeHtml(l.desc)}</td>
          <td class="amt">${l.qty}</td>
          <td class="amt">${formatMoney(l.unit, sel.currency).replace(/^[^\d-]+/, "")}</td>
          <td class="amt">${formatMoney(l.amt, sel.currency)}</td>
        </tr>`).join("");

    const docPreview = `
      <div class="ocr-page ${sel.blurry ? "badscan" : ""}">
        ${bboxesHtml}
        <div class="letterhead">
          <div class="lh-l">
            <div class="vname">${escapeHtml(sel.vendorName)}</div>
            <div class="vaddr">${escapeHtml(sel.vendorAddr)}</div>
          </div>
          <div class="lh-r">
            <div class="label">INVOICE</div>
            <div>No. ${escapeHtml(sel.invoiceNo)}</div>
            <div>Date ${escapeHtml(sel.invoiceDate)}</div>
            <div>Due ${escapeHtml(sel.dueDate)}</div>
          </div>
        </div>
        <div class="meta-row">
          <div><span class="k">Bill to</span><br/><span class="v">Aker BP ASA · AP</span></div>
          <div><span class="k">PO ref</span><br/><span class="v">${escapeHtml(sel.poRef)}</span></div>
          <div><span class="k">Currency</span><br/><span class="v">${escapeHtml(sel.currency)}</span></div>
          <div><span class="k">Payment terms</span><br/><span class="v">Net 30</span></div>
        </div>
        <table class="lines">
          <thead><tr><th>Description</th><th style="text-align:right;width:32px;">Qty</th><th style="text-align:right;width:70px;">Unit</th><th style="text-align:right;width:90px;">Amount</th></tr></thead>
          <tbody>${linesPreviewHtml}</tbody>
        </table>
        <div class="totals">
          <table>
            <tr><td>Subtotal</td><td class="amt" style="text-align:right;">${formatMoney(sel.grand - sel.vat, sel.currency)}</td></tr>
            ${sel.vat > 0 ? `<tr><td>VAT 20%</td><td class="amt" style="text-align:right;">${formatMoney(sel.vat, sel.currency)}</td></tr>` : ""}
            <tr class="grand"><td>Total</td><td class="amt" style="text-align:right;">${formatMoney(sel.grand, sel.currency)}</td></tr>
          </table>
        </div>
        ${sel.hasHandwriting ? `<div class="handwritten" style="margin-top:14px;">PO override → 4500024112-B  / approved by buyer ✓</div>` : ""}
        ${sel.signature ? `<div class="signature">~Mette Skar~</div>` : ""}
        ${sel.stamp ? `<div class="stamp">PAID</div>` : ""}
      </div>`;

    // Confidence panel
    const fld = (lbl, val, conf, mono, alt) => `
      <div class="ocr-field ${conf < 75 ? "uncertain" : ""}">
        <span class="lbl">${escapeHtml(lbl)}</span>
        <span class="val ${mono ? "mono" : ""}">${val}${alt ? '<span class="alt">' + alt + '</span>' : ''}</span>
        <span class="conf ${ocrConfBucket(conf)}">${conf}%</span>
      </div>`;

    const fieldsHtml =
      fld("Vendor",       escapeHtml(sel.vendorName) + (sel.vendorGuess ? ' · <span class="num" style="font-family:\'SF Mono\', Menlo, monospace; font-size:11px;">' + sel.vendorGuess + '</span>' : ' · <span style="color:var(--bad)">not in master</span>'), sel.confidence.vendor, false) +
      fld("Invoice no.",  escapeHtml(sel.invoiceNo), sel.confidence.invoiceNo, true) +
      fld("Invoice date", escapeHtml(sel.invoiceDate), sel.confidence.invoiceDate, true) +
      fld("Due date",     escapeHtml(sel.dueDate), sel.confidence.dueDate, true) +
      fld("PO reference", escapeHtml(sel.poRef), sel.confidence.po, true, sel.confidence.po < 50 ? "needs buyer confirm" : null) +
      fld("Total",        formatMoney(sel.grand, sel.currency), sel.confidence.total, true);

    const pipelineHtml = sel.pipeline.map(s => `
      <div class="stp ${s.status}">
        <span class="name">${escapeHtml(s.name)}</span>
        <span class="ms">${s.ms}ms</span>
      </div>`).join("");

    const actionsHtml = isPromoted ? `
        <span class="promoted">✓ Promoted to invoice queue · ${escapeHtml(promoted[sel.id])}</span>
        <button class="secondary" data-action="ocr-unpromote" data-id="${sel.id}">↺ Pull back</button>
      ` : sel.status === "failed" ? `
        <button class="reject" data-action="ocr-reject" data-id="${sel.id}">✕ Send back to vendor</button>
        <button class="secondary" data-action="ocr-manual" data-id="${sel.id}">✎ Manual entry</button>
      ` : `
        <button class="primary" data-action="ocr-promote" data-id="${sel.id}" ${sel.overallConf < 70 ? "disabled" : ""}>${sel.overallConf >= 95 ? "▶ Promote to invoice queue" : "▶ Promote with review flag"}</button>
        <button class="secondary" data-action="ocr-rerun" data-id="${sel.id}">↻ Re-run extraction</button>
        ${sel.overallConf < 95 ? `<button class="reject" data-action="ocr-reject" data-id="${sel.id}">✕ Reject — request digital re-issue</button>` : ""}
      `;

    detailHtml = `
      <div class="ocr-doc">
        <h3>Document preview</h3>
        <p class="sub">${escapeHtml(sel.fileName)} · ${sel.pages} page${sel.pages > 1 ? "s" : ""} · ${escapeHtml(sel.sourceDet)}</p>
        ${docPreview}
      </div>

      <div class="ocr-extract">
        <div class="head">
          <h3>Extracted by Document Intelligence</h3>
          <span class="agent-tag">OCR Agent · Layout-LM v3 + GPT-4o-mini</span>
        </div>
        <div class="overall">
          <div class="big-conf ${overallBucket}">${sel.overallConf}<span class="lbl">CONF</span></div>
          <div class="ov-info">
            <h4>${sel.overallConf >= 95 ? "Ready for auto-post" : sel.overallConf >= 75 ? "Promote with buyer review" : sel.overallConf >= 50 ? "Manual review required" : "Extraction failed"}</h4>
            <p>${escapeHtml(sel.notes)}</p>
          </div>
        </div>

        <h4 class="sect">Header fields · per-field confidence</h4>
        ${fieldsHtml}

        <h4 class="sect">Line items</h4>
        ${linesHtml}

        <div class="ocr-pipeline">
          <h5>Processing pipeline · ${sel.pipeline.reduce((s, p) => s + p.ms, 0)}ms total</h5>
          <div class="steps">${pipelineHtml}</div>
        </div>

        <div class="ocr-actions">
          ${actionsHtml}
        </div>
      </div>`;
  }

  const filterTabs = [
    { k: "all",       l: "All · " + docs.length },
    { k: "extracted", l: "Extracted" },
    { k: "review",    l: "Review · " + review },
    { k: "failed",    l: "Failed · " + failed },
    { k: "scan",      l: "Scans" }
  ];

  return `
    <div class="ocr-hero">
      <h2>OCR &amp; Document Intelligence</h2>
      <p class="sub">A vision-and-language agent that reads every legacy PDF, paper scan and portal upload — born-digital, photocopied, handwritten or stamped — and lifts it into the structured AP queue. The agent never auto-posts low-confidence extractions: anything below 95% confidence comes to a human with the evidence pinned to the page.</p>
      <div class="stats">
        <div class="stat"><span class="lbl">Documents this week</span><span class="val">${total}</span><span class="det">${auto} ready · ${review} review · ${failed} failed</span></div>
        <div class="stat"><span class="lbl">Avg confidence</span><span class="val">${avgConf}%</span><span class="det">across the corpus</span></div>
        <div class="stat"><span class="lbl">Avg pipeline time</span><span class="val accent">${(avgLatency / 1000).toFixed(2)}s</span><span class="det">page → structured invoice</span></div>
        <div class="stat"><span class="lbl">Straight-to-queue rate</span><span class="val">${Math.round((auto / Math.max(1, total)) * 100)}%</span><span class="det">no human touch needed</span></div>
      </div>
    </div>

    <div class="ocr-layout">
      <div class="ocr-queue">
        <div class="ocr-queue-hdr">
          <span class="lbl">Incoming documents</span>
          <div class="seg">
            ${filterTabs.map(t => `<button class="${filter === t.k ? "active" : ""}" data-action="ocr-filter" data-k="${t.k}">${escapeHtml(t.l)}</button>`).join("")}
          </div>
        </div>
        ${rowsHtml}
      </div>

      <div class="ocr-detail">
        ${detailHtml}
      </div>
    </div>
  `;
}

function tlFormatTs(ts) {
  if (!ts) return "—";
  return ts.replace("T", " ").slice(0, 16);
}

function tlActorLabel(a) {
  return ({ agent: "AI Agent", human: "Human", system: "System", vendor: "Vendor" })[a] || a;
}

function buildTrendSeries() {
  // Build a synthetic but plausible 12-week trend: auto-post rate climbing,
  // exception rate falling. Anchor the latest week to the live invoice corpus.
  const total = state.invoices.length || 1;
  const liveAuto = Math.round((state.invoices.filter(i => i.status === "auto-posted").length / total) * 100);
  const liveExc  = Math.round((state.invoices.filter(i => i.status === "exception").length / total) * 100);
  const targetAuto = Math.max(liveAuto, 78);
  const targetExc  = Math.max(2, Math.min(liveExc, 22));
  const weeks = 12;
  const auto = [];
  const exc  = [];
  for (let i = 0; i < weeks; i++) {
    // Start lower, ramp to target
    const t = i / (weeks - 1);
    const a = Math.round(58 + (targetAuto - 58) * t + (i % 3 === 0 ? 2 : -1));
    const e = Math.round(34 + (targetExc  - 34) * t + (i % 4 === 0 ? -1 : 1));
    auto.push(Math.max(0, Math.min(100, a)));
    exc.push(Math.max(0, Math.min(100, e)));
  }
  return { auto, exc, weeks };
}

function trendSparklineSvg(series) {
  const W = 720, H = 200, padL = 36, padR = 12, padT = 8, padB = 28;
  const xStep = (W - padL - padR) / (series.auto.length - 1);
  const scaleY = v => padT + (H - padT - padB) * (1 - v / 100);
  const path = (vals) => vals.map((v, i) => (i === 0 ? "M" : "L") + (padL + i * xStep).toFixed(1) + "," + scaleY(v).toFixed(1)).join(" ");
  const areaPath = path(series.auto) + " L" + (padL + (series.auto.length - 1) * xStep).toFixed(1) + "," + (H - padB) + " L" + padL + "," + (H - padB) + " Z";
  const gridLines = [0, 25, 50, 75, 100].map(y => `<line class="grid" x1="${padL}" x2="${W - padR}" y1="${scaleY(y)}" y2="${scaleY(y)}" /><text class="ax-label" x="${padL - 6}" y="${scaleY(y) + 3}" text-anchor="end">${y}%</text>`).join("");
  const weekLabels = series.auto.map((_, i) => {
    if (i % 2 !== 0 && i !== series.auto.length - 1) return "";
    const x = padL + i * xStep;
    const lbl = i === series.auto.length - 1 ? "Now" : "W-" + (series.auto.length - 1 - i);
    return `<text class="ax-label" x="${x}" y="${H - 8}" text-anchor="middle">${lbl}</text>`;
  }).join("");
  const dots = (vals, cls) => vals.map((v, i) => `<circle class="${cls}" cx="${(padL + i * xStep).toFixed(1)}" cy="${scaleY(v).toFixed(1)}" r="${i === vals.length - 1 ? 4 : 2.4}" />`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    ${gridLines}
    <path class="area-auto" d="${areaPath}" />
    <path class="line-auto" d="${path(series.auto)}" />
    <path class="line-exc"  d="${path(series.exc)}" />
    ${dots(series.auto, "dot-auto")}
    ${dots(series.exc, "dot-exc")}
    ${weekLabels}
  </svg>`;
}

function buildVendorConsistency() {
  // For each vendor with multiple invoices, compute % that share the modal GL
  const byVendor = {};
  (state.invoices || []).forEach(inv => {
    if (!inv.coding || !inv.coding.gl) return;
    (byVendor[inv.vendor] = byVendor[inv.vendor] || []).push(inv.coding.gl);
  });
  const rows = [];
  Object.entries(byVendor).forEach(([vid, gls]) => {
    if (gls.length < 2) return;
    const counts = {};
    gls.forEach(g => counts[g] = (counts[g] || 0) + 1);
    const modal = Math.max(...Object.values(counts));
    const pct = Math.round((modal / gls.length) * 100);
    rows.push({ vendor: vid, name: (VENDORS[vid] && VENDORS[vid].name) || vid, pct, n: gls.length });
  });
  return rows.sort((a, b) => b.pct - a.pct).slice(0, 6);
}

    const byField = {};
    corrections.forEach(c => byField[c.field] = (byField[c.field] || 0) + 1);
    const top = Object.entries(byField).sort((a, b) => b[1] - a[1])[0];
    if (top) insights.push("Most frequent correction this week is <strong>" + (top[0] === "cc" ? "WBS element" : top[0] === "gl" ? "GL account" : "tax code") + "</strong> — " + top[1] + " override" + (top[1] === 1 ? "" : "s") + " recorded. The model will weight your choice from tomorrow's batch onwards.");

  const vc = buildVendorConsistency();
  if (vc.length > 0) {

    insights.push("<strong>" + escapeHtml(best.name) + "</strong> has the most consistent coding pattern (" + best.pct + "% to a single GL). The Coding Agent now auto-posts these without review.");

function seedComms() {
  // Build a draft email per invoice based on context.
  // Kinds:
  //   buyer-variance — 3-way mismatch, awaiting buyer clarification
  //   vendor-lowconf — coding confidence < 75%, ask vendor for clarification
  //   approver-req   — total > 5M NOK, formal CFO approval request
  //   ses-confirm    — SES posted, send confirmation to vendor
  const out = [];
  let n = 1;
  const today = (state._frozenToday || new Date()).toISOString().slice(0, 10);
  (state.invoices || []).forEach(inv => {
    const v = VENDORS[inv.vendor] || {};
    const po = (state.purchaseOrders || []).find(p => p.poNo === inv.po);
    // 1) Variance to buyer
    if (inv.matching && inv.matching.result === "mismatch") {
      const buyer = (po && po.buyer) || "buyer@akerbp.com";
      out.push({
        id: "C-" + String(1000 + n++),
        invoiceId: inv.id,
        kind: "buyer-variance",
        to: buyer,
        from: "ap-platform@akerbp.com",
        subject: "Action needed — variance on PO " + inv.po + " (" + inv.id + ")",
        body: "Hi,\n\nThe invoice from " + (v.name || inv.vendor) + " for PO " + inv.po + " cannot post because " + (inv.matching.issue || "of a variance against goods receipt or service entry") + "\n\nCould you confirm the correct quantity, post the missing GR/SES in SAP, or let us know if a credit note is required from the vendor?\n\nThe exception is open in the AP platform — link attached.\n\nThanks,\nAP Platform (on behalf of Helge Torsøy)",
        status: "draft",
        createdAt: inv.received,
        sentAt: null,
        replyAt: null
      });
    }
    // 2) Low confidence to vendor
    const conf = inv.coding && inv.coding.confidence;
    if (conf != null && conf < 75 && inv.status !== "auto-posted") {
      out.push({
        id: "C-" + String(1000 + n++),
        invoiceId: inv.id,
        kind: "vendor-lowconf",
        to: v.contact || "ap@" + (inv.vendor || "vendor").toLowerCase() + ".com",
        from: "ap-platform@akerbp.com",
        subject: "Clarification on invoice " + inv.id,
        body: "Hi " + (v.name || "team") + ",\n\nWe received your invoice " + inv.id + " (" + formatMoney(inv.total, inv.currency) + ") and our coding model would like to confirm the cost category before posting.\n\nCould you confirm:\n  • Whether the line items relate to the Kameleon Infill West (P.ALVHE) project or another work order?\n  • Whether VAT code 25 H applies as charged?\n\nWe'll process the invoice as soon as we hear back.\n\nKind regards,\nAP Platform · Aker BP",
        status: "draft",
        createdAt: inv.received,
        sentAt: null,
        replyAt: null
      });
    }
    // 3) High-value approver request
    if ((inv.total || 0) > 5000000) {
      out.push({
        id: "C-" + String(1000 + n++),
        invoiceId: inv.id,
        kind: "approver-req",
        to: "cfo@akerbp.com",
        from: "ap-platform@akerbp.com",
        subject: "Approval required — " + formatMoney(inv.total, inv.currency) + " · " + (v.name || inv.vendor),
        body: "Hi,\n\nInvoice " + inv.id + " from " + (v.name || inv.vendor) + " for " + formatMoney(inv.total, inv.currency) + " has cleared 3-way matching and coding to " + (inv.coding && inv.coding.gl) + " / " + (inv.coding && inv.coding.cc) + ".\n\nAs the total exceeds 5M NOK it requires your formal approval before SAP posting.\n\n" + (po ? "PO: " + po.poNo + " · Buyer: " + po.buyer : "Non-PO charge") + "\n\nOne-click approve in the AP platform — link attached.\n\nThanks,\nAP Platform",
        status: "draft",
        createdAt: inv.received,
        sentAt: null,
        replyAt: null
      });
    }
    // 4) SES confirmation (synthetic — generate one for a few mid-tier invoices)
    if (inv.status === "posted" && inv.matching && inv.matching.type === "3-way" && n % 3 === 0) {
      out.push({
        id: "C-" + String(1000 + n++),
        invoiceId: inv.id,
        kind: "ses-confirm",
        to: v.contact || "ap@" + (inv.vendor || "vendor").toLowerCase() + ".com",
        from: "ap-platform@akerbp.com",
        subject: "Confirmation — invoice " + inv.id + " posted",
        body: "Hi,\n\nThis is to confirm that invoice " + inv.id + " (" + formatMoney(inv.total, inv.currency) + ") has been matched against the Service Entry Sheet and posted to our ledger. Payment will be released on the due date per our Net 30 terms.\n\nThanks,\nAP Platform · Aker BP",
        status: "sent",
        createdAt: inv.received,
        sentAt: inv.received,
        replyAt: null
      });
    }
  });

  // Mark a handful of older drafts as sent / awaiting reply, so the inbox looks lived-in.
  const drafts = out.filter(c => c.status === "draft");
  drafts.forEach((c, i) => {
    if (i % 5 === 0) { c.status = "sent"; c.sentAt = c.createdAt; }
    else if (i % 7 === 0) { c.status = "awaiting"; c.sentAt = c.createdAt; }
    else if (i % 11 === 0) { c.status = "replied"; c.sentAt = c.createdAt; c.replyAt = today; }
  });

  return out.sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
}

function ensureComms() {
  if (state.comms == null) state.comms = seedComms();
  return state.comms;
}

function commsCounts() {
  const list = ensureComms();
  return {
    all:      list.length,
    draft:    list.filter(c => c.status === "draft").length,
    sent:     list.filter(c => c.status === "sent").length,
    awaiting: list.filter(c => c.status === "awaiting").length,
    replied:  list.filter(c => c.status === "replied").length
  };
}

function commsKindLabel(kind) {
  return ({
    "buyer-variance": "Buyer · variance",
    "vendor-lowconf": "Vendor · clarify",
    "approver-req":   "Approver · sign-off",
    "ses-confirm":    "Vendor · confirm"
  })[kind] || kind;
}

function renderComms() {
  const all = ensureComms();
  const counts = commsCounts();
  const f = state.commsFilter || "all";
  let list = all;
  if (f === "draft")    list = all.filter(c => c.status === "draft");
  if (f === "sent")     list = all.filter(c => c.status === "sent" || c.status === "replied");
  if (f === "awaiting") list = all.filter(c => c.status === "awaiting");

  const active = state.commsActive ? all.find(c => c.id === state.commsActive) : null;

  // Stats
  const todayStr = (state._frozenToday || new Date()).toISOString().slice(0, 10);
  const sentToday = all.filter(c => (c.sentAt || "").slice(0, 10) === todayStr).length;
  const totalSent = all.filter(c => c.status !== "draft").length;
  const replyRate = totalSent > 0 ? Math.round((all.filter(c => c.status === "replied").length / totalSent) * 100) : 0;
  const stats = `
    <div class="comms-stats">
      <div class="stat"><div class="lbl">Drafts pending</div><div class="val warn">${counts.draft}</div><div class="sub">ready for review</div></div>
      <div class="stat"><div class="lbl">Sent this period</div><div class="val ok">${totalSent}</div><div class="sub">${sentToday} today</div></div>
      <div class="stat"><div class="lbl">Awaiting reply</div><div class="val">${counts.awaiting}</div><div class="sub">follow-up suggested ≥ 3d</div></div>
      <div class="stat"><div class="lbl">Response rate</div><div class="val ok">${replyRate}%</div><div class="sub">last 30 days</div></div>
    </div>`;

  const sel = state.commsSelected || [];
  const bulkbar = sel.length > 0 ? `
    <div class="comms-bulkbar">
      <span class="count">${sel.length} selected</span>
      <button class="btn primary" data-action="comms-bulk-send">✉ Send all</button>
      <button class="btn secondary" data-action="comms-bulk-discard">Discard drafts</button>
      <button class="clear" data-action="comms-bulk-clear">Clear selection</button>
    </div>` : '';

  const items = list.length === 0 ? `
    <div class="comms-empty-state">
      <div class="icon">✉</div>
      <div>No ${f === "all" ? "" : f + " "}messages</div>
    </div>` : list.map(c => {
    const inv = (state.invoices || []).find(i => i.id === c.invoiceId);
    const v = inv && VENDORS[inv.vendor];
    const isActive = active && c.id === active.id;
    const preview = (c.body || "").replace(/\n/g, " ").slice(0, 120);
    const when = (c.sentAt || c.createdAt || "").slice(5, 16).replace("T", " ");
    return `
      <div class="comms-item ${isActive?'active':''}" data-action="comms-open" data-id="${c.id}">
        <div class="top">
          <span class="to">${escapeHtml(c.to)}</span>
          <span class="when">${escapeHtml(when)}</span>
        </div>
        <div class="subj">${escapeHtml(c.subject)}</div>
        <div class="meta">
          <span class="pill ${c.status}">${c.status}</span>
          <span class="pill kind">${escapeHtml(commsKindLabel(c.kind))}</span>
          <span style="color:var(--muted);">${escapeHtml(c.invoiceId)}${v ? " · " + escapeHtml(v.name) : ""}</span>
        </div>
        <div class="preview">${escapeHtml(preview)}…</div>
      </div>`;
  }).join("");

  const detail = active ? renderCommsDetail(active) : `
    <div class="empty">
      <div class="icon">✉</div>
      <div>Select a message to read or edit</div>
      <div style="font-size:12px; margin-top:6px;">${counts.draft} draft${counts.draft===1?'':'s'} awaiting your review</div>
    </div>`;

  return `
    <div style="margin-bottom: 18px;">
      <h2 style="margin: 0 0 6px; color: var(--ink); font-size: 22px;">Communication Agent — inbox</h2>
      <p style="margin: 0; color: var(--muted); font-size: 13.5px;">Every email the agent drafts on your behalf, plus replies from buyers and vendors. Review, edit, send.</p>
    </div>
    ${stats}
    ${bulkbar}
    <div class="comms-wrap">
      <div class="comms-list">
        <div class="filters">
          <button class="${f==='all'?'active':''}"      data-action="comms-filter" data-v="all">All<span class="ct">${counts.all}</span></button>
          <button class="${f==='draft'?'active':''}"    data-action="comms-filter" data-v="draft">Drafts<span class="ct">${counts.draft}</span></button>
          <button class="${f==='awaiting'?'active':''}" data-action="comms-filter" data-v="awaiting">Awaiting<span class="ct">${counts.awaiting}</span></button>
          <button class="${f==='sent'?'active':''}"     data-action="comms-filter" data-v="sent">Sent<span class="ct">${counts.sent + counts.replied}</span></button>
        </div>
        <div class="scroll">${items}</div>
      </div>
      <div class="comms-detail">${detail}</div>
    </div>`;
}

  return `

function answerCustAi(raw) {
  const q = (raw || "").toLowerCase().trim();
  if (!q) return "Tell me what you'd like to configure and I'll propose the exact setting and section to land on.";
  if (/threshold|auto[-\s]?post|confidence/.test(q)) {
    return "Got it. I'd raise the auto-post threshold to <strong>95%</strong> for any vendor flagged as 'new' (less than 90 days of history). I'll route you to <em>Automation rules → Per-vendor threshold overrides</em>; you can confirm or tweak before it takes effect.";
  }
  if (/route|approval|approver|manager|over\s*\d+k|above\s*\d+/.test(q)) {
    return "I'd add a routing rule: <strong>Non-PO invoices above 25,000 NOK → Bernt Olsen for approval</strong>. Existing routing for PO-backed invoices stays unchanged. Heading to <em>Approval workflows</em> to confirm.";
  }
  if (/shadow|test|dry|trial|tune/.test(q)) {
    return "Shadow mode for a specific vendor: the AI proposes but never posts, so you can validate against the live data. I'll set this on the vendor and bookmark the result in <em>Vendor customizing</em>. Drop the vendor ID and I'll wire it up.";
  }
  if (/template|email|comm|vendor.*language/.test(q)) {
    return "I'd open <em>Email templates</em> with a new variant for vendor follow-ups. The Communication Agent will A/B the tone against your existing template for two weeks and recommend the winner.";
  }
  if (/peppol|xml|integration|sap|connector/.test(q)) {
    return "Integration changes route through <em>Integrations</em>. I can pre-fill a PEPPOL endpoint mapping or a SAP RFC connection card — tell me which system and I'll stage the config.";
  }
  return "I can wire that — but I want to confirm a couple of details first. Tell me which vendor, threshold, or workflow you have in mind and I'll propose the exact change and which section to land on.";
}

// PO -> Contract mapping (for contract chip in invoice matching panel)
const PO_TO_CONTRACT = {
  "4500119887": "C-2024-0118",
  "4500119892": "C-2024-0223",
  "4500119901": "C-2024-0512",
  "4500119915": "C-2024-0118"
};
function contractForInvoice(inv) {
  if (!inv || !inv.po) return null;
  const cid = PO_TO_CONTRACT[inv.po];
  if (!cid || typeof CONTRACTS === "undefined") return null;
  return CONTRACTS[cid] || null;
}
function contractChipHtml(inv) {
  const c = contractForInvoice(inv);
  if (!c) return "";
  const consumedPct = c.valueCommitted ? Math.round((c.valueConsumed / c.valueCommitted) * 100) : 0;
  return `
    <div class="contract-chip">
      <div class="cc-left">
        <div class="cc-eyebrow">Contract this invoice is issued against</div>
        <div class="cc-title">${escapeHtml(c.id)} · ${escapeHtml(c.title)}</div>
        <div class="cc-meta">
          <span><b>${escapeHtml(c.type)}</b></span>
          <span>Terms: ${escapeHtml(c.paymentTerms)}</span>
          <span>Owner: ${escapeHtml(c.owner)}</span>
          <span>Expires: ${escapeHtml(c.expires)}</span>
        </div>
      </div>
      <div class="cc-right">
        <div class="cc-consume">
          <div class="bar"><div class="fill" style="width:${consumedPct}%"></div></div>
          <div class="lbl">${consumedPct}% of ${formatMoney(c.valueCommitted, c.currency)} consumed</div>
        </div>
      </div>
    </div>`;
}

function openInvoice(id) {
  state.modalId = id;
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  state.currentInvoiceId = id;
  state.modalTab = "render";
  refreshModal();
  overlay.classList.add("show");
}

function refreshModal() {
  const inv = state.invoices.find(i => i.id === state.currentInvoiceId);
  if (!inv) return;
  const vendor = VENDORS[inv.vendor];
  const stages = invStages(inv);

  const tabs = [
    { key: "render", label: "Invoice view" },
    { key: "source", label: inv.source === "PEPPOL" ? "Source XML" : "Source PDF text" }
  ];
  if (inv.type === "Non-PO") tabs.push({ key: "coding", label: "Coding Agent" });
  if (inv.type === "PO") tabs.push({ key: "matching", label: "Matching Agent" });
  tabs.push({ key: "sap", label: "SAP posting" });

  modal.innerHTML = `
    <header>
      <div>

function renderTabContent(inv, vendor) {
  if (state.modalTab === "render") return renderInvoiceVisual(inv, vendor);
  if (state.modalTab === "source") return renderInvoiceSource(inv, vendor);
  if (state.modalTab === "coding") return renderCodingPanel(inv) + aiSuggestPanel("invoice_coding");
  if (state.modalTab === "matching") return renderMatchingPanel(inv, PURCHASE_ORDERS[inv.po]) + aiSuggestPanel("invoice_matching");
  if (state.modalTab === "sap") return renderSapPanel(inv, vendor) + aiSuggestPanel("invoice_sap");
  return "";
}

function closeModal() {
  state.modalId = null;
  overlay.classList.remove("show");
  modal.innerHTML = "";
  state.currentInvoiceId = null;
}
overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });

/* ============================================================
   Service Entry Sheet (SAP Lean Service Procurement)
   ============================================================ */
const sesOverlay = document.getElementById("ses-overlay");
const sesModal = document.getElementById("ses-modal");

function openSesModal(invoiceId) {
  let inv = invoiceId ? state.invoices.find(i => i.id === invoiceId) : null;
  let poNo = inv && inv.po ? inv.po : Object.keys(PURCHASE_ORDERS)[0];
  let po = PURCHASE_ORDERS[poNo];
  let lineIdx = 0, maxGap = -1;
  po.lines.forEach((l, i) => { const r = l.qty - l.ses_qty; if (r > maxGap) { maxGap = r; lineIdx = i; } });
  const line = po.lines[lineIdx];
  const remaining = Math.max(0, line.qty - line.ses_qty);
  let prefillQty = remaining;
  let shortText = "Service performed under PO " + poNo + " line " + line.line;
  if (inv) {
    const matchLine = inv.lines.find(l => l.uom === line.uom);
    if (matchLine) { prefillQty = matchLine.qty; shortText = matchLine.desc; }
  }
  state.sesOpenInvoiceId = invoiceId || null;
  const seedWbs = (inv && inv.coding && inv.coding.cc && inv.coding.cc !== "-") ? inv.coding.cc : WBS_ELEMENTS[0];
  state.sesDraft = {
    poNo, lineIdx, qty: prefillQty,
    periodFrom: "2026-04-23", periodTo: "2026-05-07",
    performer: VENDORS[po.vendor] ? VENDORS[po.vendor].name : "",
    shortText, supervisor: po.buyer,
    serviceOrder: "8000" + poNo.slice(-4),
    serviceLine: String((lineIdx + 1) * 10),
    limitItem: "L-00" + (lineIdx + 1),
    wbs: seedWbs,
    submitting: false
  };
  refreshSesModal();
  sesOverlay.classList.add("show");
}

function closeSesModal() {
  sesOverlay.classList.remove("show");
  sesModal.innerHTML = "";
  state.sesOpenInvoiceId = null;
  state.sesDraft = null;
}
sesOverlay.addEventListener("click", e => { if (e.target === sesOverlay) closeSesModal(); });

function refreshSesModal() {
  const d = state.sesDraft;
  if (!d) return;
  const po = PURCHASE_ORDERS[d.poNo];
  const line = po.lines[d.lineIdx];
  const remaining = line.qty - line.ses_qty;
  const totalValue = (Number(d.qty) || 0) * line.price;
  const inv = state.sesOpenInvoiceId ? state.invoices.find(i => i.id === state.sesOpenInvoiceId) : null;
  const overRemaining = Number(d.qty) > remaining;

  const lineRows = po.lines.map((l, i) => {
    const rem = l.qty - l.ses_qty;
    const gapClass = rem === 0 ? "ok" : "gap";
    const label = rem === 0 ? "fully entered" : (rem + " " + l.uom + " open");
    return '<button class="ses-line-row ' + (i === d.lineIdx ? "active" : "") + '" data-action="ses-pick-line" data-idx="' + i + '">'
      + '<div class="ses-line-main"><strong>Line ' + l.line + '</strong> · ' + l.desc + '</div>'
      + '<div class="ses-line-meta"><span>' + l.qty + ' ' + l.uom + ' ordered · ' + l.ses_qty + ' ' + l.uom + ' entered</span><span class="gap-pill ' + gapClass + '">' + label + '</span></div>'
      + '</button>';
  }).join("");

  const poOptions = Object.keys(PURCHASE_ORDERS).map(k => {
    const v = VENDORS[PURCHASE_ORDERS[k].vendor];
    return '<option value="' + k + '" ' + (k === d.poNo ? "selected" : "") + '>' + k + ' · ' + (v ? v.name : "") + '</option>';
  }).join("");

  const payload = generateSesPayload(d, po, line);
  const linkedNote = inv ? ('<div class="ses-info-row"><span>Linked to invoice</span><strong>' + inv.id + '</strong></div>') : "";
  const variantNote = inv && inv.matching && inv.matching.delta && inv.matching.delta.diff > 0
    ? ('<div class="ses-leansp-note">Posting this SES will close the matching variance on ' + inv.id + ' (' + inv.matching.delta.diff + ' ' + line.uom + ' short).</div>') : "";

  sesModal.innerHTML = ''
    + '<header><div><h2>Create Service Entry Sheet</h2>'
    + '<div style="color:var(--muted); font-size:12px; margin-top:4px;">SAP Lean Service Procurement · references service order line, not a classic PO line</div>'
    + '</div><button class="close" id="close-ses-modal">×</button></header>'
    + '<div class="body"><div class="ses-modal-grid">'
    + '<div>'
    + '<h3 style="margin-top:0; color:var(--magenta-dark); font-size:13px;">Service order &amp; line</h3>'
    + '<div class="ses-form-grid">'
    + '<label>Reference PO / service order</label>'
    + '<select data-ses-field="poNo">' + poOptions + '</select>'
    + '<label>Service line</label>'
    + '<div class="ses-line-list">' + lineRows + '</div>'
    + '</div>'
    + '<h3 style="margin-top:24px; color:var(--magenta-dark); font-size:13px;">Service entry</h3>'
    + '<div class="ses-form-grid">'
    + '<label>Service period from</label>'
    + '<input type="date" data-ses-field="periodFrom" value="' + d.periodFrom + '" />'
    + '<label>Service period to</label>'
    + '<input type="date" data-ses-field="periodTo" value="' + d.periodTo + '" />'
    + '<label>Quantity (' + line.uom + ')</label>'
    + '<input type="number" min="0" step="0.01" data-ses-field="qty" value="' + d.qty + '" />'
    + '<label>Unit price</label>'
    + '<div class="ses-info-row"><span>From service line</span><strong>' + formatMoney(line.price, po.currency) + ' / ' + line.uom + '</strong></div>'
    + '<label>Net amount</label>'
    + '<div class="ses-info-row"><span>Auto-calculated</span><strong>' + formatMoney(totalValue, po.currency) + '</strong></div>'
    + '<label>Short text</label>'
    + '<input type="text" data-ses-field="shortText" value="' + d.shortText.replace(/"/g, "&quot;") + '" />'
    + '</div>'
    + '<h3 style="margin-top:24px; color:var(--magenta-dark); font-size:13px;">Account assignment</h3>'
    + '<div class="ses-form-grid">'
    + '<label>WBS element</label>'
    + '<select data-ses-field="wbs">' + WBS_ELEMENTS.map(function(w){ return '<option value="' + w + '"' + (w === d.wbs ? ' selected' : '') + '>' + w + '</option>'; }).join("") + '</select>'
    + '<label>Company code</label>'
    + '<div class="ses-info-row"><span>Aker BP ASA</span><strong>NO01</strong></div>'
    + '</div>'
    + '<div class="ses-leansp-note"><strong>Lean Service Procurement</strong> — this SES references service order <code>' + d.serviceOrder + '</code>, line <code>' + d.serviceLine + '</code>, limit item <code>' + d.limitItem + '</code>. No classic Goods Receipt is posted — the SES itself is the proof of service delivery.</div>'
    + linkedNote + variantNote
    + (overRemaining ? '<div class="ses-leansp-note" style="border-left-color:var(--bad); background:var(--bad-soft); color:var(--bad);"><strong>Warning</strong> — quantity exceeds remaining limit (' + remaining + ' ' + line.uom + ' open). SAP will reject if line is not a limit item.</div>' : "")
    + '</div>'
    + '<div>'
    + '<h3 style="margin-top:0; color:var(--magenta-dark); font-size:13px;">SAP REST payload preview</h3>'
    + '<div style="color:var(--muted); font-size:11px; margin-bottom:8px;"><code>POST /sap/opu/odata/sap/API_SERVICE_ENTRY_SHEET_SRV/A_ServiceEntrySheet</code></div>'
    + '<pre class="code">' + escapeHtml(payload) + '</pre>'
    + '</div>'
    + '</div>'
    + '<div class="modal-actions">'
    + '<span style="margin-right:auto; color:var(--muted); font-size:12px; align-self:center;">SES is posted to SAP via OData — auditable, reversible</span>'
    + '<button class="btn ghost" data-action="ses-cancel">Cancel</button>'
    + '<button class="btn primary" data-action="ses-submit" ' + (d.submitting ? "disabled" : "") + '>' + (d.submitting ? "Posting…" : "Post SES to SAP") + '</button>'
    + '</div></div>';

  document.getElementById("close-ses-modal").onclick = closeSesModal;
  attachHandlers();
  sesModal.querySelectorAll("[data-ses-field]").forEach(el => {
    el.addEventListener("input", ev => {
      const f = ev.target.dataset.sesField;
      let val = ev.target.value;
      if (f === "qty") val = parseFloat(val) || 0;
      if (f === "poNo") {
        state.sesDraft.poNo = val;
        state.sesDraft.lineIdx = 0;
        state.sesDraft.serviceOrder = "8000" + val.slice(-4);
        const newLine = PURCHASE_ORDERS[val].lines[0];
        state.sesDraft.qty = Math.max(0, newLine.qty - newLine.ses_qty);
        state.sesDraft.shortText = "Service performed under PO " + val + " line " + newLine.line;
        state.sesDraft.performer = VENDORS[PURCHASE_ORDERS[val].vendor] ? VENDORS[PURCHASE_ORDERS[val].vendor].name : "";
        state.sesDraft.supervisor = PURCHASE_ORDERS[val].buyer;
        refreshSesModal();
        return;
      }
      state.sesDraft[f] = val;
      refreshSesModal();
    });
  });
}

function generateSesPayload(d, po, line) {
  const totalValue = (Number(d.qty) || 0) * line.price;
  const wbsString = d.wbs || (po && po.wbs) || WBS_ELEMENTS[0];
  const code = wbsCode(wbsString);
  const m = wbsMaster(wbsString) || {};
  const obj = {
    CompanyCode: "NO01",
    ServiceEntrySheetName: (d.shortText || "").slice(0, 40),
    PurchaseOrder: d.poNo,
    PurchaseOrderItem: line.line,
    ServiceOrder: d.serviceOrder,
    PostingDate: d.periodTo,
    ServicePeriodStartDate: d.periodFrom,
    ServicePeriodEndDate: d.periodTo,
    Currency: po.currency,
    AccountAssignment: {
      AccountAssignmentCategory: "P",
      WBSElement: code,
      WBSElementName: m.name || ""
    },
    to_ServiceEntrySheetItem: [{
      ServiceEntrySheetItem: "0010",
      Service: line.desc.slice(0, 40),
      Quantity: Number(d.qty) || 0,
      QuantityUnit: line.uom,
      Price: line.price,
      NetAmount: totalValue,
      AccountAssignmentCategory: "P",
      WBSElement: code,
      ConfirmationType: "LEAN_SP",
      LimitItem: d.limitItem
    }]
  };
  return JSON.stringify(obj, null, 2);
}

function submitSes() {
  const d = state.sesDraft;
  if (!d) return;
  const po = PURCHASE_ORDERS[d.poNo];
  const line = po.lines[d.lineIdx];
  const qty = Number(d.qty) || 0;
  if (qty <= 0) { toast("Enter a quantity greater than zero"); return; }
  d.submitting = true;
  refreshSesModal();
  setTimeout(() => {
    line.ses_qty += qty;
    const sesNo = "1000" + (Math.floor(Math.random() * 90000) + 10000);
    const linkedInvId = state.sesOpenInvoiceId;
    if (linkedInvId) {
      const inv = state.invoices.find(i => i.id === linkedInvId);
      if (inv && inv.matching && inv.matching.delta) {
        const newDiff = Math.max(0, inv.matching.delta.diff - qty);
        inv.matching.delta.diff = newDiff;
        inv.matching.delta.ses_qty += qty;
        inv.matching.delta.diff_value = newDiff * line.price;
        if (newDiff === 0) {
          inv.matching.result = "match";
          inv.matching.issue = "";
          inv.status = "review";
          logEvent(inv.id, "Matching Agent", "Variance closed automatically — SES posted via cockpit");
        }
      }
      logEvent(linkedInvId, "AP Specialist", "Service Entry Sheet " + sesNo + " posted to SAP — " + qty + " " + line.uom + " @ " + formatMoney(line.price, po.currency) + " on PO " + d.poNo + " line " + line.line);
    } else {
      logEvent("SES", "AP Specialist", "Service Entry Sheet " + sesNo + " posted to SAP — " + qty + " " + line.uom + " @ " + formatMoney(line.price, po.currency) + " on PO " + d.poNo + " line " + line.line);
    }
    toast("✓ SES " + sesNo + " posted to SAP");
    closeSesModal();
    if (overlay.classList.contains("show")) refreshModal();
    render();
  }, 600);
}

function buildMatchPairs(inv, po) {
  // For each PO line, pair it with the closest invoice line (best-effort:
  // first try invoice line index alignment, then first un-paired line).
  const pairs = [];
  const usedInv = new Set();
  po.lines.forEach((pl, i) => {
    let il = null, idx = -1;
    // Try matching by exact UoM and similar price first
    inv.lines.forEach((x, xi) => {
      if (usedInv.has(xi)) return;
      if (il) return;
      if (x.uom === pl.uom && Math.abs(x.price - pl.price) <= pl.price * 0.05) { il = x; idx = xi; }
    });
    // Fallback: positional alignment
    if (!il && inv.lines[i] && !usedInv.has(i)) { il = inv.lines[i]; idx = i; }
    if (idx >= 0) usedInv.add(idx);
    pairs.push({ poLine: pl, invLine: il });
  });
  // Any invoice lines not paired with a PO line — show as orphan (charge not on PO)
  inv.lines.forEach((il, xi) => {
    if (!usedInv.has(xi)) pairs.push({ poLine: null, invLine: il });
  });
  return pairs;
}

function match3wayLine(pair, inv, po) {
  const pl = pair.poLine;
  const il = pair.invLine;

  // ORPHAN — invoice line with no matching PO line
  if (!pl && il) {
    return `
      <div class="match3-line variance">
        <div class="ttl">
          <span class="ln">—</span>
          <span class="desc">${escapeHtml(il.desc)}</span>
          <span class="badge bad">No matching PO line</span>
        </div>
        <div class="match3-grid">
          <div class="col po">
            <div class="src"><span class="dot"></span>PO line</div>
            <div class="row"><span class="lbl">Status</span><span class="val diff">Not on PO</span></div>
          </div>
          <div class="col gr">
            <div class="src"><span class="dot"></span>Goods receipt / SES</div>
            <div class="row"><span class="lbl">Status</span><span class="val diff">No GR / SES posted</span></div>
          </div>
          <div class="col inv">
            <div class="src"><span class="dot"></span>Invoice</div>
            <div class="row"><span class="lbl">Qty</span><span class="val">${il.qty} ${il.uom}</span></div>
            <div class="row"><span class="lbl">Unit</span><span class="val">${formatMoney(il.price, inv.currency)}</span></div>
            <div class="row"><span class="lbl">Total</span><span class="val">${formatMoney(il.total, inv.currency)}</span></div>
          </div>
        </div>
      </div>`;
  }

  // MISSING — PO line but no invoice line yet (under-invoicing)
  if (pl && !il) {
    return `
      <div class="match3-line ok">
        <div class="ttl">
          <span class="ln">${pl.line}</span>
          <span class="desc">${escapeHtml(pl.desc)}</span>
          <span class="badge ok">Open — awaiting invoice</span>
        </div>
        <div class="match3-grid">
          <div class="col po">
            <div class="src"><span class="dot"></span>PO line</div>
            <div class="row"><span class="lbl">Qty</span><span class="val">${pl.qty} ${pl.uom}</span></div>
            <div class="row"><span class="lbl">Unit</span><span class="val">${formatMoney(pl.price, po.currency)}</span></div>
          </div>
          <div class="col gr">
            <div class="src"><span class="dot"></span>Goods receipt / SES</div>
            <div class="row"><span class="lbl">GR</span><span class="val">${pl.gr_qty} ${pl.uom}</span></div>
            <div class="row"><span class="lbl">SES</span><span class="val">${pl.ses_qty} ${pl.uom}</span></div>
          </div>
          <div class="col inv">
            <div class="src"><span class="dot"></span>Invoice</div>
            <div class="row"><span class="val" style="color:var(--muted);">Not yet invoiced</span></div>
          </div>
        </div>
      </div>`;
  }

  // PAIRED — full 3-way comparison
  const qtyDiff   = il.qty - pl.ses_qty;
  const priceDiff = il.price - pl.price;
  const priceTol  = pl.price * 0.02;
  const qtyOk     = qtyDiff === 0;
  const priceOk   = Math.abs(priceDiff) <= priceTol;
  const overall   = qtyOk && priceOk;
  const cls       = overall ? "ok" : "variance";
  const badge     = overall
    ? '<span class="badge ok">3-way match within tolerance</span>'
    : '<span class="badge bad">Variance · needs attention</span>';

  return `
    <div class="match3-line ${cls}">
      <div class="ttl">
        <span class="ln">${pl.line}</span>
        <span class="desc">${escapeHtml(pl.desc)}</span>
        ${badge}
      </div>
      <div class="match3-grid">
        <div class="col po">
          <div class="src"><span class="dot"></span>PO line</div>
          <div class="row"><span class="lbl">Qty</span><span class="val">${pl.qty} ${pl.uom}</span></div>
          <div class="row"><span class="lbl">Unit</span><span class="val">${formatMoney(pl.price, po.currency)}</span></div>
          <div class="row"><span class="lbl">Total</span><span class="val">${formatMoney(pl.qty * pl.price, po.currency)}</span></div>
        </div>
        <div class="col gr">
          <div class="src"><span class="dot"></span>Goods receipt / SES</div>
          <div class="row"><span class="lbl">GR</span><span class="val">${pl.gr_qty} ${pl.uom}</span></div>
          <div class="row"><span class="lbl">SES</span><span class="val">${pl.ses_qty} ${pl.uom}</span></div>
          <div class="row"><span class="lbl">Open</span><span class="val ${pl.qty - pl.ses_qty > 0 ? 'diff' : 'match'}">${pl.qty - pl.ses_qty} ${pl.uom}</span></div>
        </div>
        <div class="col inv">
          <div class="src"><span class="dot"></span>Invoice claim</div>
          <div class="row"><span class="lbl">Qty</span><span class="val ${qtyOk ? 'match' : 'diff'}">${il.qty} ${il.uom}${!qtyOk ? ' (' + (qtyDiff>0?'+':'') + qtyDiff + ')' : ' ✓'}</span></div>
          <div class="row"><span class="lbl">Unit</span><span class="val ${priceOk ? 'match' : 'diff'}">${formatMoney(il.price, inv.currency)}${!priceOk ? ' (' + (priceDiff>0?'+':'') + formatMoney(priceDiff, inv.currency) + ')' : ' ✓'}</span></div>
          <div class="row"><span class="lbl">Total</span><span class="val">${formatMoney(il.total, inv.currency)}</span></div>
        </div>
      </div>
    </div>`;
}

function match3waySummary(inv, po) {
  const invTotal = inv.lines.reduce((s, l) => s + (l.total || 0), 0);
  const poTotal  = po.lines.reduce((s, l) => s + (l.qty * l.price), 0);
  const sesTotal = po.lines.reduce((s, l) => s + (l.ses_qty * l.price), 0);
  const grTotal  = po.lines.reduce((s, l) => s + (l.gr_qty * l.price), 0);
  const variance = invTotal - sesTotal;
  const vCls = variance === 0 ? "ok" : "bad";
  return `
    <div class="match3-summary">
      <div class="cell"><span class="lbl">PO total</span><span class="val">${formatMoney(poTotal, po.currency)}</span></div>
      <div class="cell"><span class="lbl">GR total</span><span class="val">${formatMoney(grTotal, po.currency)}</span></div>
      <div class="cell"><span class="lbl">SES approved</span><span class="val">${formatMoney(sesTotal, po.currency)}</span></div>
      <div class="cell"><span class="lbl">Invoice vs SES</span><span class="val ${vCls}">${variance >= 0 ? '+' : ''}${formatMoney(variance, inv.currency)}</span></div>
    </div>`;
}

function invStages(inv) {
  const s = [{ name: "Captured", detail: `${inv.source} ingestion`, state: "done" }];
  if (inv.type === "Non-PO") {
    s.push({ name: "Coding Agent", detail: `GL ${inv.coding.gl} @ ${inv.coding.confidence}%`, state: "done" });
  } else {
    s.push({ name: "Matching Agent", detail: `${inv.matching.type} ${inv.matching.result}`, state: inv.matching.result === "match" ? "done" : "active" });
  }
  if (inv.status === "auto-posted") {
    s.push({ name: "Approval", detail: "Auto-approved (≥ threshold)", state: "done" });
    s.push({ name: "Posted to SAP", detail: "Parked FI document", state: "done" });
  } else if (inv.status === "review") {
    s.push({ name: "Approval", detail: "Awaiting human review", state: "active" });
    s.push({ name: "Posted to SAP", detail: "Pending", state: "" });
  } else if (inv.status === "exception") {
    s.push({ name: "Approval", detail: "Blocked by exception", state: "" });
    s.push({ name: "Posted to SAP", detail: "Pending", state: "" });
  } else {
    s.push({ name: "Posted to SAP", detail: "Posted (HITL)", state: "done" });
  }
  return s;
}

function handleAction(action, id, el) {
  if (action === "kpi-edit") { openKpiEdit(id); return; }
  if (action === "kpi-new") { openKpiNew(); return; }
  if (action === "kpi-cancel") { closeKpiEdit(); return; }
  if (action === "kpi-save") { saveKpiDraft(); return; }
  if (action === "kpi-delete") { deleteKpiDraft(); return; }
  if (action === "kpi-reset") { resetKpis(); return; }
  if (action === "tour2-start") {
    const step = el && el.dataset.step != null ? parseInt(el.dataset.step) : 0;
    setActiveTour("general");
    openTour2(step);
    return;
  }
  if (action === "guide-start") {
    const role = (el && el.dataset.role) || "general";
    setActiveTour(role);
    closeTour();
    openTour2(0);
    return;
  }

function handleCustAction(action, el) {
  // Template accordion
  if (action === "tmpl-toggle") {
    const id = el.dataset.tmpl;
    state.custTmplOpen = state.custTmplOpen === id ? null : id;
    render();
    return;
  }
  if (action === "tmpl-lang") {
    state.custTmplLang[el.dataset.tmpl] = el.dataset.lang;
    render();
    return;
  }
  if (action === "tmpl-add-lang") {
    const tmpl = state.emailTemplates.find(t => t.id === el.dataset.tmpl);
    if (!tmpl) return;
    const existing = Object.keys(tmpl.languages);
    const next = existing.includes("no") ? null : "no";
    if (!next) { toast("Both languages already configured"); return; }
    tmpl.languages[next] = { subject: "", body: "" };
    state.custTmplLang[tmpl.id] = next;
    render();
    return;
  }
  if (action === "tmpl-insert") {
    const tmplId = el.dataset.tmpl;
    const lang = el.dataset.lang;
    const variable = el.dataset.var;
    const ta = document.querySelector(`textarea[data-tmpl-field="body"][data-tmpl="${tmplId}"][data-lang="${lang}"]`);
    if (!ta) return;
    const start = ta.selectionStart || ta.value.length;
    const end = ta.selectionEnd || ta.value.length;
    const newVal = ta.value.slice(0, start) + variable + ta.value.slice(end);
    ta.value = newVal;
    const tmpl = state.emailTemplates.find(t => t.id === tmplId);
    if (tmpl && tmpl.languages[lang]) tmpl.languages[lang].body = newVal;
    ta.focus();
    ta.setSelectionRange(start + variable.length, start + variable.length);
    return;
  }
  if (action === "tmpl-test") {
    toast("✉ Test email sent to helge.torsoy@akerbp.com");
    return;
  }
  if (action === "tmpl-preview") {
    const tmpl = state.emailTemplates.find(t => t.id === el.dataset.tmpl);
    const lang = el.dataset.lang;
    if (!tmpl || !tmpl.languages[lang]) return;
    showTemplatePreview(tmpl, lang);
    return;
  }

  // Notification toggles
  if (action === "notif-toggle") {
    const key = el.dataset.key;
    if (state.notifications[key]) {
      state.notifications[key].enabled = !state.notifications[key].enabled;
      render();
    }
    return;
  }

  // Vendor threshold rows
  if (action === "vt-add") {
    state.vendorThresholds.push({ vendor: "V-1001", threshold: 95, note: "" });
    render();
    return;
  }
  if (action === "vt-del") {
    state.vendorThresholds.splice(parseInt(el.dataset.idx), 1);
    render();
    return;
  }

  // Approval rules rows
  if (action === "ar-add") {
    state.approvalRules.push({ range: "New tier", approver: "—", sla: "3 business days" });

    return;
  }
  if (action === "ar-del") {
    state.approvalRules.splice(parseInt(el.dataset.idx), 1);

    return;
  }

  // PDF rules rows
  if (action === "pdf-add") {
    state.pdfRules.push({ vendor: "all", profile: "New profile", invoiceNumber: "label-anchor: 'Invoice no'", date: "label-anchor: 'Date'", total: "label-anchor: 'Total'", language: "auto-detect", currencyDefault: "NOK", confThreshold: 85 });
    render();
    return;
  }
  if (action === "pdf-del") {
    state.pdfRules.splice(parseInt(el.dataset.idx), 1);
    render();
    return;
  }

  // Coding rules rows
  if (action === "cr-add") {
    state.codingRules.push({ vendor: "any", description: "(any)", gl: "6300", cc: "5000 - Finance & Admin", note: "" });
    render();
    return;
  }
  if (action === "cr-del") {
    state.codingRules.splice(parseInt(el.dataset.idx), 1);
    render();
    return;
  }

  // Save bar
  if (action === "reset") {
    toast("Section reset to defaults");
    return;
  }
  if (action === "export") {
    const cfg = {
      automation: { autoPost: state.autoPost, shadowMode: state.shadowMode, threshold: state.threshold, maxAutoPost: state.custMaxAutoPost, vendorThresholds: state.vendorThresholds },
      approvalRules: state.approvalRules,
      emailTemplates: state.emailTemplates,
      notifications: state.notifications,
      pdfRules: state.pdfRules,
      codingRules: state.codingRules,
      vendorPrefs: state.vendorPrefs
    };
    const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "ap-platform-config.json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast("✓ Configuration exported");
    return;

/* ============================================================
   Analytics — flexible KPI dashboard
   ============================================================ */
const FX_TO_NOK = { NOK: 1, USD: 10.5, EUR: 11.6 };
function toNok(amount, ccy) {
  const rate = FX_TO_NOK[ccy] || 1;
  return amount * rate;
}

function getInvScopeForFilter() {
  const f = state.anStatusFilter;
  if (f === "all") return state.invoices;
  if (f === "auto") return state.invoices.filter(i => i.status === "auto-posted");
  if (f === "exception") return state.invoices.filter(i => i.status === "exception" || i.status === "review");
  if (f === "review") return state.invoices.filter(i => i.status === "review");
  if (f === "po") return state.invoices.filter(i => i.type === "PO");
  if (f === "non-po") return state.invoices.filter(i => i.type === "Non-PO");
  return state.invoices;
}

function kpiMatch(inv, criteria) {
  if (!criteria) return true;
  for (const key of Object.keys(criteria)) {
    const want = criteria[key];
    if (key === "codingConfGt") {
      if (!(inv.coding && inv.coding.confidence > want)) return false;
      continue;
    }
    if (want === "*") continue;
    const opts = String(want).split("|");
    let val;
    if (key === "status") val = inv.status;
    else if (key === "source") val = inv.source;
    else if (key === "type") val = inv.type;
    else if (key === "vendor") val = inv.vendor;
    else val = inv[key];
    if (!opts.includes(String(val))) return false;
  }
  return true;
}

function kpiFieldValue(inv, field) {
  if (!field) return 0;
  if (field === "total") return toNok(inv.total || 0, inv.currency);
  if (field === "vat") return toNok(inv.vat || 0, inv.currency);
  if (field.startsWith("coding.")) {
    const sub = field.split(".")[1];
    return inv.coding ? (inv.coding[sub] || 0) : 0;
  }
  if (field.startsWith("matching.")) {
    const sub = field.split(".")[1];
    return inv.matching ? (inv.matching[sub] || 0) : 0;
  }
  return inv[field] || 0;
}

function computeKpi(kpi) {
  const scope = getInvScopeForFilter();
  if (kpi.agg === "count") {
    return scope.filter(i => kpiMatch(i, kpi.filter)).length;
  }
  if (kpi.agg === "sum") {
    return scope.filter(i => kpiMatch(i, kpi.filter))
      .reduce((acc, i) => acc + kpiFieldValue(i, kpi.field), 0);
  }
  if (kpi.agg === "avg") {
    const matches = scope.filter(i => kpiMatch(i, kpi.filter));
    if (!matches.length) return 0;
    const sum = matches.reduce((acc, i) => acc + kpiFieldValue(i, kpi.field), 0);
    return sum / matches.length;
  }
  if (kpi.agg === "percent") {
    const denom = scope.filter(i => kpiMatch(i, kpi.denom)).length;
    if (!denom) return 0;
    const numer = scope.filter(i => kpiMatch(i, kpi.numer)).length;
    return (numer / denom) * 100;
  }
  if (kpi.agg === "ses-gap-value") {
    let total = 0;
    Object.keys(PURCHASE_ORDERS).forEach(k => {
      const po = PURCHASE_ORDERS[k];
      po.lines.forEach(l => {
        const gap = Math.max(0, l.qty - l.ses_qty);
        total += toNok(gap * l.price, po.currency);
      });
    });
    return total;
  }
  return 0;
}

function formatKpiValue(val, kpi) {
  if (kpi.unit === "%") return val.toFixed(1);
  if (kpi.unit === "NOK") {
    if (val >= 1e6) return (val / 1e6).toFixed(2) + "M";
    if (val >= 1e3) return Math.round(val / 1e3) + "k";
    return Math.round(val).toLocaleString("en-US");
  }
  if (Number.isInteger(val)) return String(val);
  return val.toFixed(1);
}

function kpiStatus(val, kpi) {
  if (kpi.target == null || kpi.target === "") return "neutral";
  if (kpi.direction === "higher") return val >= kpi.target ? "good" : "bad";
  return val <= kpi.target ? "good" : "bad";
}

function kpiFormulaLabel(kpi) {
  if (kpi.agg === "count") return "count of invoices";
  if (kpi.agg === "sum") return "sum of " + (kpi.field || "—");
  if (kpi.agg === "avg") return "avg of " + (kpi.field || "—");
  if (kpi.agg === "percent") return "% (subset / scope)";
  if (kpi.agg === "ses-gap-value") return "open SES value across PO lines";
  return kpi.agg;
}

function renderAnalytics() {
  const enabled = state.kpis.filter(k => k.enabled);
  const cards = enabled.map(k => {
    const v = computeKpi(k);
    const display = formatKpiValue(v, k);
    const status = kpiStatus(v, k);
    let pct = 0;
    if (k.target != null && k.target !== "" && k.target !== 0) {
      pct = Math.min(100, (v / k.target) * 100);
    } else if (k.target === 0 && k.direction === "lower") {
      pct = v === 0 ? 100 : 0;
    } else {
      pct = Math.min(100, (v / Math.max(1, v)) * 100);
    }
    const targetLabel = k.target != null && k.target !== ""
      ? "Target " + (k.direction === "lower" ? "≤ " : "≥ ") + formatKpiValue(k.target, k) + (k.unit ? " " + k.unit : "")
      : "No target set";
    const statusLabel = status === "good" ? "On target" : status === "bad" ? (k.direction === "lower" ? "Above target" : "Below target") : "—";
    return `
      <div class="kpi-card kpi-${status}" data-kpi="${k.id}">
        <div class="kpi-head">
          <div class="kpi-name" title="${escapeHtml(k.description || "")}">${escapeHtml(k.name)}</div>
          <button class="kpi-edit-btn" data-action="kpi-edit" data-id="${k.id}" title="Configure">⚙</button>
        </div>
        <div class="kpi-value">${display}<span class="kpi-unit">${k.unit ? " " + k.unit : ""}</span></div>
        <div class="kpi-target">${targetLabel}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct}%"></div></div>
        <span class="kpi-status ${status}">${statusLabel}</span>
        <div class="kpi-formula">${escapeHtml(kpiFormulaLabel(k))}</div>
      </div>
    `;
  }).join("");

  const groupBy = state.anGroupBy;
  const scope = getInvScopeForFilter();
  const groupAgg = {};
  scope.forEach(i => {
    let key;
    if (groupBy === "vendor") key = VENDORS[i.vendor] ? VENDORS[i.vendor].name : i.vendor;
    else if (groupBy === "source") key = i.source;
    else if (groupBy === "status") key = i.status;
    else if (groupBy === "type") key = i.type;
    else if (groupBy === "currency") key = i.currency;
    else key = "—";
    if (!groupAgg[key]) groupAgg[key] = { count: 0, value: 0 };
    groupAgg[key].count += 1;
    groupAgg[key].value += toNok(i.total || 0, i.currency);
  });
  const groupRows = Object.keys(groupAgg).sort((a, b) => groupAgg[b].value - groupAgg[a].value);
  const maxValue = Math.max(1, ...groupRows.map(k => groupAgg[k].value));
  const barRows = groupRows.map(k => {
    const v = groupAgg[k].value;
    const w = (v / maxValue) * 100;
    return `<div class="an-bar-row"><div class="lbl">${escapeHtml(k)}</div><div class="track"><div class="fill" style="width:${w}%"></div></div><div class="val">${formatKpiValue(v, { unit: "NOK" })}</div></div>`;
  }).join("");

  const statusMix = {};
  state.invoices.forEach(i => { statusMix[i.status] = (statusMix[i.status] || 0) + 1; });
  const statusColors = { "auto-posted": "#2e7d32", "review": "#ed8936", "exception": "#ce0f69", "posted": "#7d2248", "rejected": "#a13e3e" };
  const statusTotal = state.invoices.length || 1;
  const statusEntries = Object.keys(statusMix).map(k => ({ name: k, val: statusMix[k], pct: (statusMix[k] / statusTotal) * 100, color: statusColors[k] || "#888" }));
  statusEntries.sort((a, b) => b.val - a.val);

  const sourceMix = { PEPPOL: 0, PDF: 0 };
  state.invoices.forEach(i => { sourceMix[i.source] = (sourceMix[i.source] || 0) + 1; });
  const srcColors = { PEPPOL: "#7d2248", PDF: "#ce0f69" };
  const sourceTotal = state.invoices.length || 1;
  const srcEntries = Object.keys(sourceMix).map(k => ({ name: k, val: sourceMix[k], pct: (sourceMix[k] / sourceTotal) * 100, color: srcColors[k] }));

  const donut = (entries, totalLabel) => {
    let cum = 0;
    const r = 70, cx = 90, cy = 90;
    const arcs = entries.map(e => {
      if (e.val === 0) return "";
      const startAngle = (cum / 100) * 2 * Math.PI - Math.PI / 2;
      cum += e.pct;
      const endAngle = (cum / 100) * 2 * Math.PI - Math.PI / 2;
      const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
      const large = e.pct > 50 ? 1 : 0;
      return `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${e.color}" />`;
    }).join("");
    return `<svg class="an-donut" viewBox="0 0 180 180">${arcs}<circle cx="${cx}" cy="${cy}" r="44" fill="#ffffff" /><text x="${cx}" y="${cy - 2}" text-anchor="middle" font-size="22" font-weight="900" fill="#7d2248" font-family="Lato, Arial, sans-serif">${totalLabel}</text><text x="${cx}" y="${cy + 16}" text-anchor="middle" font-size="10" fill="#7e8794" font-family="Arial">total</text></svg>`;
  };

  const statusLegend = statusEntries.map(e => `<div class="lg-row"><span class="sw" style="background:${e.color}"></span><span class="lg-name">${escapeHtml(e.name)}</span><span class="lg-val">${e.val}</span><span class="lg-pct">${e.pct.toFixed(0)}%</span></div>`).join("");
  const srcLegend = srcEntries.map(e => `<div class="lg-row"><span class="sw" style="background:${e.color}"></span><span class="lg-name">${escapeHtml(e.name)}</span><span class="lg-val">${e.val}</span><span class="lg-pct">${e.pct.toFixed(0)}%</span></div>`).join("");

  const togglesList = state.kpis.map(k => `
    <div class="kpi-toggle-row ${k.enabled ? "" : "off"}">
      <div>
        <div class="kt-name">${escapeHtml(k.name)}${k.builtIn ? "" : " <span style='font-size:10px;color:var(--magenta);text-transform:uppercase;letter-spacing:0.6px;'>· custom</span>"}</div>
        <div class="kt-meta">${escapeHtml(k.description || "")}</div>
      </div>
      <label class="switch">
        <input type="checkbox" ${k.enabled ? "checked" : ""} data-action="kpi-toggle" data-id="${k.id}" />
        <span class="slider"></span>
      </label>
    </div>
  `).join("");

  return `
    <div class="an-hero">
      <div>
        <h2>Analytics &amp; KPIs</h2>
        <p>Track touchless rate, exception load, supplier concentration, and any other metric your team cares about — all driven live by the invoices in the cockpit. Configure thresholds, add your own KPIs, and the cards refresh as data flows in.</p>
      </div>
      <div class="actions">
        <button class="btn primary" data-action="kpi-new">+ New KPI</button>
        <button class="btn secondary" data-action="kpi-reset">Reset to defaults</button>
      </div>
    </div>

    <div class="an-toolbar">
      <label>Scope</label>
      <select data-an-control="status">
        <option value="all" ${state.anStatusFilter === "all" ? "selected" : ""}>All invoices</option>
        <option value="auto" ${state.anStatusFilter === "auto" ? "selected" : ""}>Only auto-posted</option>
        <option value="exception" ${state.anStatusFilter === "exception" ? "selected" : ""}>Only exceptions / review</option>
        <option value="po" ${state.anStatusFilter === "po" ? "selected" : ""}>PO-based only</option>
        <option value="non-po" ${state.anStatusFilter === "non-po" ? "selected" : ""}>Non-PO only</option>
      </select>
      <label style="margin-left:14px;">Group breakdown by</label>
      <select data-an-control="groupBy">
        <option value="vendor" ${groupBy === "vendor" ? "selected" : ""}>Vendor</option>
        <option value="source" ${groupBy === "source" ? "selected" : ""}>Source channel</option>
        <option value="status" ${groupBy === "status" ? "selected" : ""}>Processing status</option>
        <option value="type" ${groupBy === "type" ? "selected" : ""}>PO / Non-PO</option>
        <option value="currency" ${groupBy === "currency" ? "selected" : ""}>Currency</option>
      </select>
      <div class="spacer"></div>
      <span style="font-size:11px; color:var(--muted);">Live · refreshes as invoices arrive</span>
    </div>

    <div class="kpi-grid">${cards || '<div style="grid-column:1/-1;padding:30px;text-align:center;color:var(--muted);font-size:13px;">No KPIs enabled — turn some on in the configuration panel below.</div>'}</div>

    <div class="an-2col">
      <div class="an-section">
        <h3>Spend by ${groupBy === "vendor" ? "vendor" : groupBy} <span class="sub">${formatKpiValue(scope.reduce((acc, i) => acc + toNok(i.total || 0, i.currency), 0), { unit: "NOK" })} NOK total in scope</span></h3>
        <div class="an-bars">${barRows || '<div style="color:var(--muted);font-size:12px;">No data in scope.</div>'}</div>
      </div>
      <div class="an-section">
        <h3>Status mix <span class="sub">${state.invoices.length} invoices</span></h3>
        <div class="an-donut-wrap">
          ${donut(statusEntries, state.invoices.length)}
          <div class="an-legend">${statusLegend}</div>
        </div>
      </div>
    </div>

    <div class="an-2col">
      <div class="an-section">
        <h3>Channel mix <span class="sub">PEPPOL is structured · PDF is IDP-extracted</span></h3>
        <div class="an-donut-wrap">
          ${donut(srcEntries, state.invoices.length)}
          <div class="an-legend">${srcLegend}</div>
        </div>
      </div>
      <div class="an-section">
        <h3>KPI configuration <span class="sub">Toggle, edit, or add new metrics</span></h3>
        <div class="kpi-toggle-list">${togglesList}</div>
      </div>
    </div>

    <div class="an-section">
      <h3>How the KPIs are calculated <span class="sub">Transparency for the steering committee</span></h3>
      <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 12px; font-size:12px; line-height:1.6; color:var(--gray-700);">
        <div><strong style="color:var(--magenta-dark);">Touchless rate</strong> = invoices with status <code>auto-posted</code> ÷ all invoices in scope. The headline number for whether the platform is paying for itself.</div>
        <div><strong style="color:var(--magenta-dark);">Exception rate</strong> = invoices with <code>exception</code> or <code>review</code> ÷ all invoices in scope. We want this trending down quarter-on-quarter.</div>
        <div><strong style="color:var(--magenta-dark);">Avg coding confidence</strong> = mean of <code>coding.confidence</code> across invoices that received an AI suggestion. Tracks whether the model is improving or drifting.</div>
        <div><strong style="color:var(--magenta-dark);">Open SES variance</strong> = sum of (PO line qty − approved SES qty) × price across all open POs. Points at where Lean SP confirmations are missing.</div>
        <div><strong style="color:var(--magenta-dark);">PEPPOL share</strong> = invoices arriving as structured eInvoice ÷ all invoices. Higher is better — no extraction risk, no OCR cost.</div>
        <div><strong style="color:var(--magenta-dark);">Custom KPIs</strong> use the same formula engine — count, sum, average, percent, or open SES value — over any filter you can express with a status, source, type, or vendor selector.</div>
      </div>
    </div>
  `;
}

function refreshKpiEditModal() {
  const d = state.kpiDraft;
  const overlayEl = document.getElementById("kpi-edit-overlay");
  const modalEl = document.getElementById("kpi-edit-modal");
  if (!d) {
    overlayEl.classList.remove("show");
    modalEl.innerHTML = "";
    return;
  }
  const isCustom = d.builtIn !== true;
  const aggOptions = ["count","sum","avg","percent","ses-gap-value"]
    .map(a => `<option value="${a}" ${d.agg === a ? "selected" : ""}>${a}</option>`).join("");
  const statusOpts = ["*","auto-posted","exception","review","posted","rejected","auto-posted|posted","exception|review"]
    .map(s => `<option value="${s}" ${d._numerStatus === s ? "selected" : ""}>${s === "*" ? "any" : s}</option>`).join("");
  const denomOpts = ["*","auto-posted|posted","exception|review"]
    .map(s => `<option value="${s}" ${d._denomStatus === s ? "selected" : ""}>${s === "*" ? "any (whole scope)" : s}</option>`).join("");
  const fieldOpts = ["total","vat","coding.confidence","matching.confidence"]
    .map(f => `<option value="${f}" ${d.field === f ? "selected" : ""}>${f}</option>`).join("");
  const dirOpts = `<option value="higher" ${d.direction === "higher" ? "selected" : ""}>higher is better</option><option value="lower" ${d.direction === "lower" ? "selected" : ""}>lower is better</option>`;
  const unitOpts = ["", "%", "NOK", "count"]
    .map(u => `<option value="${u}" ${d.unit === u ? "selected" : ""}>${u || "(none)"}</option>`).join("");

  let aggSpecific = "";
  if (d.agg === "percent") {
    aggSpecific = `
      <div class="row"><label>Numerator</label><select data-kpi-edit="numerStatus">${statusOpts}</select></div>
      <div class="row"><label>Denominator</label><select data-kpi-edit="denomStatus">${denomOpts}</select></div>
      <div class="help" style="grid-column:2;margin-top:-8px;">Touchless = auto-posted ÷ any. Exception rate = exception|review ÷ any.</div>
    `;
  } else if (d.agg === "count") {
    aggSpecific = `<div class="row"><label>Filter</label><select data-kpi-edit="numerStatus">${statusOpts}</select></div>`;
  } else if (d.agg === "sum" || d.agg === "avg") {
    aggSpecific = `
      <div class="row"><label>Field</label><select data-kpi-edit="field">${fieldOpts}</select></div>
      <div class="row"><label>Filter</label><select data-kpi-edit="numerStatus">${statusOpts}</select></div>
    `;
  } else if (d.agg === "ses-gap-value") {
    aggSpecific = `<div class="help" style="grid-column:2;">Computed across all PURCHASE_ORDERS — sum of (qty − ses_qty) × price for every line, regardless of filter.</div>`;
  }

  modalEl.innerHTML = `
    <header>
      <h2>${isCustom ? (d._isNew ? "New KPI" : "Edit custom KPI") : "Edit KPI · " + escapeHtml(d.name)}</h2>
      <button class="kpi-edit-btn" id="close-kpi-edit" style="font-size:18px;">×</button>
    </header>
    <div class="body">
      <div class="row"><label>Name</label><input type="text" data-kpi-edit="name" value="${escapeHtml(d.name)}" /></div>
      <div class="row"><label>Description</label><textarea rows="2" data-kpi-edit="description">${escapeHtml(d.description || "")}</textarea></div>
      <div class="row"><label>Aggregation</label><select data-kpi-edit="agg" ${isCustom ? "" : "disabled"}>${aggOptions}</select></div>
      ${aggSpecific}
      <div class="row"><label>Target</label><input type="number" step="0.1" data-kpi-edit="target" value="${d.target == null ? "" : d.target}" placeholder="leave blank for no target" /></div>
      <div class="row"><label>Unit</label><select data-kpi-edit="unit">${unitOpts}</select></div>
      <div class="row"><label>Direction</label><select data-kpi-edit="direction">${dirOpts}</select></div>
      <div class="help" style="margin-top:6px;">"Higher is better" turns the bar green when value ≥ target. "Lower is better" turns it green when value ≤ target.</div>
    </div>
    <div class="actions">
      ${isCustom && !d._isNew ? '<button class="btn ghost delete-side" data-action="kpi-delete">Delete</button>' : ""}
      <button class="btn ghost" data-action="kpi-cancel">Cancel</button>
      <button class="btn primary" data-action="kpi-save">${d._isNew ? "Create KPI" : "Save changes"}</button>
    </div>
  `;
  overlayEl.classList.add("show");
  document.getElementById("close-kpi-edit").onclick = () => closeKpiEdit();
  modalEl.querySelectorAll("[data-kpi-edit]").forEach(el => {
    el.addEventListener("input", ev => {
      const f = ev.target.dataset.kpiEdit;
      let v = ev.target.value;
      if (f === "target") {
        v = v === "" ? null : parseFloat(v);
        state.kpiDraft.target = v;
      } else if (f === "agg") {
        state.kpiDraft.agg = v;
        if (v === "percent") {
          state.kpiDraft._numerStatus = state.kpiDraft._numerStatus || "auto-posted";
          state.kpiDraft._denomStatus = state.kpiDraft._denomStatus || "*";
        }
        refreshKpiEditModal();
        return;
      } else if (f === "numerStatus") {
        state.kpiDraft._numerStatus = v;
      } else if (f === "denomStatus") {
        state.kpiDraft._denomStatus = v;
      } else {
        state.kpiDraft[f] = v;
      }
    });
  });
}

function openKpiEdit(kpiId) {
  const kpi = state.kpis.find(k => k.id === kpiId);
  if (!kpi) return;
  const draft = JSON.parse(JSON.stringify(kpi));
  draft._numerStatus = (kpi.numer && kpi.numer.status) || (kpi.filter && kpi.filter.status) || "*";
  draft._denomStatus = (kpi.denom && kpi.denom.status) || "*";
  state.kpiDraft = draft;
  refreshKpiEditModal();
}

function openKpiNew() {
  state.kpiDraft = {
    id: "k-custom-" + Date.now(),
    name: "New KPI",
    description: "",
    agg: "count",
    filter: { status: "*" },
    target: null,
    unit: "",
    direction: "higher",
    enabled: true,
    builtIn: false,
    _isNew: true,
    _numerStatus: "*",
    _denomStatus: "*"
  };
  refreshKpiEditModal();
}

function closeKpiEdit() {
  state.kpiDraft = null;
  document.getElementById("kpi-edit-overlay").classList.remove("show");
  document.getElementById("kpi-edit-modal").innerHTML = "";
}

function saveKpiDraft() {
  const d = state.kpiDraft;
  if (!d) return;
  const clean = {
    id: d.id, name: d.name, description: d.description,
    agg: d.agg, target: d.target, unit: d.unit, direction: d.direction,
    enabled: d.enabled !== false, builtIn: d.builtIn === true
  };
  if (d.agg === "percent") {
    clean.numer = { status: d._numerStatus || "*" };
    clean.denom = { status: d._denomStatus || "*" };
  } else if (d.agg === "count") {
    clean.filter = { status: d._numerStatus || "*" };
  } else if (d.agg === "sum" || d.agg === "avg") {
    clean.field = d.field || "total";
    clean.filter = { status: d._numerStatus || "*" };
  }
  const idx = state.kpis.findIndex(k => k.id === d.id);
  if (idx === -1) state.kpis.push(clean);
  else state.kpis[idx] = Object.assign({}, state.kpis[idx], clean);
  closeKpiEdit();
  toast(d._isNew ? "✓ KPI created" : "✓ KPI saved");
  render();
}

function deleteKpiDraft() {
  const d = state.kpiDraft;
  if (!d) return;
  state.kpis = state.kpis.filter(k => k.id !== d.id);
  closeKpiEdit();
  toast("KPI removed");
  render();
}

function resetKpis() {
  state.kpis.forEach(k => { k.enabled = true; });
  state.kpis = state.kpis.filter(k => k.builtIn);
  toast("KPIs reset to built-in defaults");
  render();
}

document.getElementById("kpi-edit-overlay").addEventListener("click", e => {
  if (e.target.id === "kpi-edit-overlay") closeKpiEdit();
});

document.addEventListener("change", e => {
  if (e.target.dataset && e.target.dataset.anControl) {
    const ctl = e.target.dataset.anControl;
    if (ctl === "status") state.anStatusFilter = e.target.value;
    if (ctl === "groupBy") state.anGroupBy = e.target.value;
    render();
  }
});
